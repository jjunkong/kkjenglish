<title>김기준영어학원 수업 관리</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'NanumGothic','Nanum Gothic',-apple-system,sans-serif;background:linear-gradient(160deg,#0a2a8a 0%,#0e9fd8 60%,#1a6fd4 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:0;}
  #app{width:100%;max-width:480px;min-height:100vh;background:transparent;padding-top:40px;}
  .gm{font-family:'GmarketSans','NanumGothic',sans-serif;font-weight:700;}
  input,select,textarea,button{font-family:'NanumGothic','Nanum Gothic',-apple-system,sans-serif;}
  /* 네이비 상단 헤더 */
  .page-header{background:linear-gradient(135deg,#3b5bdb 0%,#6d28d9 100%);padding:20px 20px 24px;position:relative;border-radius:20px;margin:12px 12px 0;}
  .page-header-sub{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:.08em;margin-bottom:4px;}
  .page-header-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px;}
  .page-header-desc{font-size:11px;color:rgba(255,255,255,0.5);}
  .page-header-back{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;padding:0 0 12px;display:block;}
  .page-header-row{display:flex;justify-content:space-between;align-items:flex-end;}
  /* 컨텐츠 영역 */
  .page-body{padding:16px;}
  .card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:1rem 1.25rem;margin-bottom:12px;}
  /* 버튼 */
  .btn-primary{background:#1a2f6e;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
  .btn-primary:hover{background:#1e3a8a;}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-danger{background:#dc2626;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
  .btn-danger:hover{background:#b91c1c;}
  .btn-back{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;padding:0 0 12px;display:block;}
  .btn-back-dark{background:transparent;border:none;color:#888;font-size:12px;cursor:pointer;padding:0 0 14px;display:block;}
  .btn-ghost{background:transparent;border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#444;}
  .btn-ghost:hover{background:#e8e4f4;}
  .btn-ghost-inv{background:rgba(255,255,255,0.15);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#fff;}
  .btn-ghost-inv:hover{background:rgba(255,255,255,0.25);}
  .btn-sm{background:#f5f5f3;border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:#666;}
  .btn-sm:hover{background:#e8e8e6;}
  /* 입력 */
  .inp{width:100%;border:1.5px solid #e8e8e6;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;color:#111;margin-bottom:10px;display:block;}
  .inp:focus{outline:none;border-color:#1a2f6e;}
  .err{color:#dc2626;font-size:12px;margin-bottom:8px;padding:8px 10px;background:#fef2f2;border-radius:8px;}
  /* 섹션 블록 */
  .section-block{margin-bottom:10px;background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e6;}
  .section-tag{display:inline-block;font-size:9px;font-weight:700;background:#1a2f6e;color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;}
  .section-ta{width:100%;border:1.5px solid #e8e8e6;border-radius:8px;padding:8px 10px;font-size:13px;resize:vertical;background:#f8f8f6;color:#333;display:block;}
  .section-ta:focus{outline:none;border-color:#1a2f6e;}
  .divider{border-top:1px solid #f0f0ee;margin:10px 0 8px;}
  /* 배지 */
  .badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .badge-done{background:#ecfdf5;color:#059669;}
  .badge-plan{background:#eff6ff;color:#2563eb;}
  .badge-none{background:#f5f5f3;color:#aaa;}
  .ok-msg{color:#059669;font-size:13px;text-align:center;padding:10px;margin-top:6px;background:#ecfdf5;border-radius:8px;}
  .empty-box{color:#aaa;font-size:13px;text-align:center;padding:2rem;background:#fff;border-radius:14px;border:1px dashed #ddd;}
  /* 학생 카드 */
  .stu-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s;}
  .stu-card:hover{border-color:#aaa;}
  /* 탭 */
  .tab-wrap{display:flex;background:#e8e8e6;border-radius:10px;padding:3px;margin-bottom:16px;}
  .tab-btn{flex:1;padding:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:#888;border-radius:8px;}
  .tab-btn.active{background:#fff;color:#1a2f6e;font-weight:700;}
  /* 요일 */
  .day-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e8e8e6;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#888;}
  .day-btn.on{background:#1a2f6e;color:#fff;border-color:#1a2f6e;}
  .days-wrap{display:flex;gap:6px;margin-bottom:12px;}
  .rate-btn{padding:5px 16px;border-radius:20px;cursor:pointer;font-size:13px;border:1.5px solid #e8e8e6;background:#fff;color:#888;font-weight:500;}
  /* 홈 */
  .home-grid-3{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
  .home-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:16px 14px;cursor:pointer;transition:border-color .15s;}
  .home-card:hover{border-color:#aaa;}
  .home-card-icon{width:34px;height:34px;border-radius:9px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .home-card-full{background:linear-gradient(135deg,#3b5bdb 0%,#6d28d9 100%);border-radius:14px;padding:16px;cursor:pointer;grid-column:1/-1;display:flex;align-items:center;gap:14px;transition:background .15s;}
  .home-card-full:hover{background:linear-gradient(135deg,#4c6ef5 0%,#7c3aed 100%);}
  .home-card-full-icon{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .tog-btn{width:100%;padding:10px;border:1px dashed #ddd;border-radius:10px;background:transparent;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .date-inp{border:1.5px solid #e8e8e6;border-radius:10px;padding:8px 12px;font-size:13px;background:#fff;color:#333;flex:1;}
  .hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .add-form{background:#fff;border-radius:12px;padding:1rem;margin-bottom:14px;border:1px solid #e8e8e6;}
  .sub-info{font-size:10px;color:#bbb;margin-top:3px;display:flex;align-items:center;gap:5px;}
  .rate-row{display:flex;gap:8px;margin-bottom:8px;}
  .p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .logout-btn{font-size:12px;color:rgba(255,255,255,0.6);background:transparent;border:none;cursor:pointer;padding:0;}
  .logout-btn:hover{color:#fff;}
  .logout-btn-dark{font-size:12px;color:#aaa;background:transparent;border:none;cursor:pointer;padding:0;}
  .chart-wrap{background:#fff;border-radius:14px;padding:1rem;margin-bottom:12px;border:1px solid #e8e8e6;}
  .chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .chart-bar-bg{flex:1;background:#e8e4f4;border-radius:4px;height:22px;overflow:hidden;}
  .chart-bar-fill{height:100%;border-radius:4px;}
  .modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:#fff;border-radius:16px;padding:1.5rem;width:90%;max-width:360px;}
  .modal-btns{display:flex;gap:8px;margin-top:14px;}
  .modal-btns button{flex:1;}
  .vid-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
  .vid-card:hover{border-color:#aaa;}
  .vid-thumb{width:100%;aspect-ratio:16/9;background:#111;border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .vid-player-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px;user-select:none;}
  .vid-player-wrap iframe{width:100%;height:100%;border:none;}
  .section-label{font-size:12px;font-weight:600;color:#1a2f6e;margin-bottom:5px;}
</style>

<body>
<div id="app"></div>
<script>
(()=>{
const DAYS=['일','월','화','수','목','금','토'];
const localDate=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;};
const TODAY=localDate();
const fd=s=>{if(!s)return'';const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);return`${m}월 ${d}일 (${DAYS[dt.getDay()]}요일)`;};
const fdShort=s=>{if(!s)return'';const[y,m,d]=s.split('-').map(Number);return`${m}/${d}`;};
const dowOf=s=>{if(!s)return-1;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).getDay();};
const emL=()=>({plan:{check:'',core:'',fix:''},res:{check:{r:'',m:''},core:{r:'',m:''},fix:{r:'',m:''}},vocab:{score:'',comment:''},status:'none'});

// Firebase REST API
const FB='https://kkjenglish-a831d-default-rtdb.firebaseio.com';
const fbGet=async path=>{try{const r=await fetch(`${FB}/${path}.json`);if(!r.ok)return null;const d=await r.json();return d;}catch{return null;}};
const fbSet=async(path,val)=>{try{await fetch(`${FB}/${path}.json`,{method:'PUT',body:JSON.stringify(val)});return true;}catch{return false;}};
const fbDel=async path=>{try{await fetch(`${FB}/${path}.json`,{method:'DELETE'});return true;}catch{return false;}};

// 메모리 캐시
const MEM={stu:[],pw:'admin1234',lessons:{},videos:[],notices:[],classes:[],leaders:[]};

// 초기 로딩
const initData=async()=>{
  try{const stu=await fbGet('students');if(stu)MEM.stu=Object.values(stu);}catch(e){}
  try{const pw=await fbGet('pw');if(pw)MEM.pw=pw;}catch(e){}
  try{const vids=await fbGet('videos');if(vids)MEM.videos=Array.isArray(vids)?vids:Object.values(vids);}catch(e){}
  try{const nots=await fbGet('notices');if(nots)MEM.notices=Array.isArray(nots)?nots:Object.values(nots);}catch(e){}
  try{const cls=await fbGet('classes');if(cls)MEM.classes=Array.isArray(cls)?cls:Object.values(cls);}catch(e){}
  try{const ldrs=await fbGet('leaders');if(ldrs)MEM.leaders=Array.isArray(ldrs)?ldrs:Object.values(ldrs);}catch(e){}
  try{const apikey=await fbGet('apikey');if(apikey)CLAUDE_API_KEY=apikey;}catch(e){}
  try{
    const solapiCfg=await fbGet('solapiCfg');
    if(solapiCfg){SOLAPI_KEY=solapiCfg.key||'';SOLAPI_SECRET=solapiCfg.secret||'';SOLAPI_SENDER=solapiCfg.sender||'';}
  }catch(e){}
};

const saveStu=async()=>{
  MEM.stu=Q.students;
  const obj={};Q.students.forEach(s=>{obj[s.id]=s;});
  await fbSet('students',obj);
};
const savePw=async pw=>{MEM.pw=pw;Q.pw=pw;await fbSet('pw',pw);};
const saveVideos=async()=>{MEM.videos=Q.videos;await fbSet('videos',Q.videos);};
const saveNotices=async()=>{MEM.notices=Q.notices;await fbSet('notices',Q.notices);};
const saveClasses=async()=>{MEM.classes=Q.classes;await fbSet('classes',Q.classes);};
const saveLeaders=async()=>{MEM.leaders=Q.leaders;await fbSet('leaders',Q.leaders);};

const getLesson=async(sid,date)=>{
  const k=`${sid}__${date}`;
  if(MEM.lessons[k])return JSON.parse(JSON.stringify(MEM.lessons[k]));
  const r=await fbGet(`lessons/${sid}/${date.replace(/-/g,'_')}`);
  if(r){MEM.lessons[k]=r;return JSON.parse(JSON.stringify(r));}
  return emL();
};
const setLesson=async(sid,date,l)=>{
  const k=`${sid}__${date}`;
  const copy=JSON.parse(JSON.stringify(l));
  MEM.lessons[k]=copy;
  await fbSet(`lessons/${sid}/${date.replace(/-/g,'_')}`,copy);
  const rd=MEM.dates?.[sid]||[];
  if(!rd.includes(date)){rd.unshift(date);rd.sort((a,b)=>b.localeCompare(a));}
  if(!MEM.dates)MEM.dates={};
  MEM.dates[sid]=rd.slice(0,60);
  await fbSet(`dates/${sid}`,MEM.dates[sid]);
};
const getDates=async sid=>{
  if(MEM.dates?.[sid])return MEM.dates[sid];
  const r=await fbGet(`dates/${sid}`);
  if(!MEM.dates)MEM.dates={};
  MEM.dates[sid]=r||[];
  return MEM.dates[sid];
};
const deleteStu=async sid=>{
  const dates=await getDates(sid);
  for(const d of dates){
    await fbDel(`lessons/${sid}/${d.replace(/-/g,'_')}`);
    delete MEM.lessons[`${sid}__${d}`];
  }
  await fbDel(`dates/${sid}`);
  if(MEM.dates)delete MEM.dates[sid];
};

let Q={scr:'home',students:MEM.stu,pw:MEM.pw,videos:MEM.videos,notices:MEM.notices,classes:MEM.classes,leaders:MEM.leaders,
  aDate:TODAY,aStu:null,aLesson:null,aTab:'plan',editStu:null,
  pStu:null,pDate:TODAY,pLesson:null,pDates:[],pTab:'plan',
  lLeader:null,
  vStu:null,vVideo:null,
  quiz:null,quizAnswers:{},quizDone:false,
  err:'',showAdd:false,showAllStu:false,showVidAdd:false,showNoticeAdd:false,loading:true};

// API 키는 Firebase에서 로드 (설정에서 입력)
let CLAUDE_API_KEY='';
let SOLAPI_KEY='';
let SOLAPI_SECRET='';
let SOLAPI_SENDER='';

const A=document.getElementById('app');
const gid=id=>document.getElementById(id);
const RC={상:'#16a34a',중:'#d97706',하:'#dc2626'};
const SL={none:'미입력',planned:'계획 입력됨',completed:'완성도 기록됨'};
const SC={none:'#9ca3af',planned:'#2563eb',completed:'#16a34a'};
const LK=['check','core','fix'];
const LABELS=['Learning — 학습 및 확인','Acquisition — 핵심 습득','Maintenance — 교정 및 유지'];
const RV={상:3,중:2,하:1};
const stuDisplayName=stu=>{
  if(!stu)return'';
  const cls=Q.classes&&Q.classes.find(c=>c.id===stu.classId);
  return cls?`${cls.name}_${stu.name}`:stu.name;
};

// 유튜브 URL → ID 추출
const ytId=url=>{
  if(!url)return'';
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?m[1]:'';
};

const mk=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;};
const mks=(tag,css,html)=>{const e=document.createElement(tag);if(css)e.style.cssText=css;if(html!==undefined)e.innerHTML=html;return e;};

function dayTags(days){
  if(!days||!days.length)return mks('span','font-size:11px;color:#aaa;','요일 미설정');
  const w=mks('span','');
  [...days].sort((a,b)=>a-b).forEach((d,i)=>{
    if(i)w.appendChild(mks('span','font-size:11px;color:#ccc;','·'));
    w.appendChild(mks('span','font-size:11px;font-weight:500;color:#888;',DAYS[d]+'요일'));
  });
  return w;
}

function dayPicker(selected,onChange){
  const w=mk('div','days-wrap');
  [1,2,3,4,5,6,0].forEach(d=>{
    const b=mk('button','day-btn'+(selected.includes(d)?' on':''),DAYS[d]);
    b.onclick=()=>{const ns=selected.includes(d)?selected.filter(x=>x!==d):[...selected,d];onChange(ns);};
    w.appendChild(b);
  });
  return w;
}

function sectionBlock(label,L,key,roplan,showRes){
  const w=mk('div','section-block');
  const tag=mk('div','section-tag',label.split('—')[0].trim());
  w.appendChild(tag);
  w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:8px;',label.split('—')[1]?.trim()||''));
  if(!roplan){
    const ta=document.createElement('textarea');
    ta.className='section-ta';ta.rows=3;ta.value=L.plan[key];
    ta.placeholder='내용을 입력하세요...';
    ta.oninput=()=>{L.plan[key]=ta.value;};w.appendChild(ta);
  } else {
    w.appendChild(mks('div','font-size:13px;color:#333;line-height:1.6;white-space:pre-wrap;min-height:16px;',L.plan[key]||'<span style="color:#ccc">—</span>'));
  }
  if(showRes){
    w.appendChild(mk('div','divider'));
    // Maintenance는 완성도 없이 단어시험+듣기과제만
    if(key!=='fix'){
      w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:6px;','완성도'));
      const bd=mk('div','rate-row');
      const btns=[];
      const RC2={'완료':'#16a34a','부분완료':'#f59e0b','미완료':'#dc2626'};
      const upd=sel=>btns.forEach(b=>{const s=b.textContent===sel;b.style.background=s?RC2[sel]:'#fff';b.style.color=s?'#fff':'#888';b.style.borderColor=s?RC2[sel]:'#e8e8e6';});
      ['완료','부분완료','미완료'].forEach(r=>{
        const sel=L.res[key].r===r;
        const b=mk('button','rate-btn',r);
        if(sel){b.style.background=RC2[r];b.style.color='#fff';b.style.borderColor=RC2[r];}
        b.onclick=()=>{L.res[key].r=r;upd(r);};btns.push(b);bd.appendChild(b);
      });
      w.appendChild(bd);
      const mi=document.createElement('input');mi.className='inp';
      mi.placeholder='피드백 메모 (선택사항)';mi.value=L.res[key].m||'';
      mi.style.marginBottom='0';mi.oninput=()=>L.res[key].m=mi.value;w.appendChild(mi);
      w.appendChild(mk('div','divider'));
      // 강사 코멘트 표시 (읽기 전용)

async function aList(){
  const w=mks('div','');A.appendChild(w);
  // 네이비 헤더
  const hdr=mk('div','page-header');
  const topRow=mks('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='home';Q.err='';render();};topRow.appendChild(bb);
  const rightBtns=mks('div','display:flex;gap:6px;');
  const settingsBtn=mk('button','btn-ghost-inv','⚙ 설정');settingsBtn.onclick=()=>{Q.scr='aSettings';Q.err='';render();};rightBtns.appendChild(settingsBtn);
  topRow.appendChild(rightBtns);
  hdr.appendChild(topRow);

  // 최근 6개월 드롭다운
  const now=new Date();
  const monthDates=[];
  for(let mOffset=0;mOffset<6;mOffset++){
    const d=new Date(now.getFullYear(),now.getMonth()-mOffset,1);
    const y=d.getFullYear(),m=d.getMonth();
    const daysInM=new Date(y,m+1,0).getDate();
    for(let day=daysInM;day>=1;day--){
      const dd=String(day).padStart(2,'0'),mm=String(m+1).padStart(2,'0');
      monthDates.push(`${y}-${mm}-${dd}`);
    }
  }
  const ds=document.createElement('select');
  ds.style.cssText='background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px;width:100%;cursor:pointer;';
  let lastMonth='';
  monthDates.forEach(d=>{
    const thisMonth=d.slice(0,7);
    if(thisMonth!==lastMonth){
      const og=document.createElement('optgroup');
      og.label=d.slice(0,4)+'년 '+String(parseInt(d.slice(5,7)))+'월';
      og.style.background='#0a1a4e';ds.appendChild(og);
      lastMonth=thisMonth;
    }
    const o=document.createElement('option');o.value=d;
    o.style.cssText='background:#1a2f6e;color:#fff;';
    o.textContent=fd(d)+(d===TODAY?' (오늘)':'');
    if(d===Q.aDate)o.selected=true;ds.appendChild(o);
  });
  ds.onchange=()=>{Q.aDate=ds.value;Q.showAllStu=false;render();};
  hdr.appendChild(ds);
  w.appendChild(hdr);

  const selDow=dowOf(Q.aDate);
  const todayStu=Q.students.filter(s=>s.days&&s.days.includes(selDow));
  const otherStu=Q.students.filter(s=>!s.days||!s.days.includes(selDow));

  const body=mk('div','page-body');w.appendChild(body);

  // 오늘 수업 학생 레슨 미리 로딩 — 캐시 없는 것만, 로딩 표시 없이 백그라운드
  const toLoad=todayStu.filter(s=>!MEM.lessons[`${s.id}__${Q.aDate}`]);
  if(toLoad.length){
    // 학생 전체 레슨을 Firebase에서 한번에 가져오기
    const allLessonsRaw=await fbGet('lessons')||{};
    todayStu.forEach(s=>{
      const key=`${s.id}__${Q.aDate}`;
      if(!MEM.lessons[key]){
        const dateKey=Q.aDate.replace(/-/g,'_');
        MEM.lessons[key]=(allLessonsRaw[s.id]&&allLessonsRaw[s.id][dateKey])||emL();
      }
    });
  }

  // 반이 없으면 안내
  if(!Q.classes||!Q.classes.length){
    const nb=mks('div','background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:14px;');
    nb.appendChild(mks('div','font-size:13px;color:#92400e;margin-bottom:6px;','⚙ 설정에서 반을 먼저 만들어주세요.'));
    nb.appendChild(mks('div','font-size:11px;color:#b45309;','설정 → 반 관리 → + 반 추가'));
    body.appendChild(nb);
  }

  // 반별 그룹
  const classes=Q.classes||[];
  const unassigned=todayStu.filter(s=>!s.classId);

  // 반 카드 렌더
  const renderClassCard=(cls,stuList)=>{
    if(!stuList.length)return;
    const expanded=Q._expandedClass===cls.id;
    const card=mks('div','background:#fff;border:1.5px solid #e8e8e6;border-radius:14px;margin-bottom:10px;overflow:hidden;');

    // 반 헤더
    const chdr=mks('div','display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;');
    const cl=mks('div','display:flex;align-items:center;gap:10px;');
    cl.appendChild(mks('div','font-size:14px;font-weight:700;color:#1a2f6e;',cls.name));
    cl.appendChild(mks('span','font-size:11px;color:#aaa;',`${stuList.length}명`));
    // 코멘트 알림 체크
    chdr.appendChild(cl);
    chdr.appendChild(mks('span','font-size:16px;color:#aaa;transition:transform .2s;',expanded?'▲':'▼'));
    chdr.onclick=()=>{Q._expandedClass=expanded?null:cls.id;render();};
    card.appendChild(chdr);

    if(expanded){
      const cbody=mks('div','padding:0 14px 14px;border-top:1px solid #f0f0ee;');

      // 공통 수업 계획 버튼
      const groupBtn=mks('div','background:#eef2ff;border:1.5px solid #c7d2fe;border-radius:10px;padding:10px 12px;margin:10px 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;');
      const gl=mks('div','');
      gl.appendChild(mks('div','font-size:12px;font-weight:700;color:#1a2f6e;','📋 공통 수업 계획 입력'));
      gl.appendChild(mks('div','font-size:10px;color:#818cf8;margin-top:2px;','선택한 학생에게 적용'));
      groupBtn.appendChild(gl);groupBtn.appendChild(mks('span','font-size:14px;color:#818cf8;','›'));
      groupBtn.onclick=()=>{Q.scr='aGroupPlan';Q._groupDate=Q.aDate;Q._groupStudents=stuList;Q._groupClassName=cls.name;render();};
      cbody.appendChild(groupBtn);

      // 학생 목록
      const SL_BADGE={none:'badge badge-none',planned:'badge badge-plan',completed:'badge badge-done'};
      stuList.forEach(stu=>{
        const l=MEM.lessons[`${stu.id}__${Q.aDate}`]||{status:'none'};
        const sc=mk('div','stu-card');sc.style.marginBottom='6px';
        const row=mks('div','display:flex;justify-content:space-between;align-items:center;');
        const left=mks('div','flex:1;cursor:pointer;');
        left.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;',(cls.name&&cls.id!=='__none__'?cls.name+'_':'')+stu.name));
        left.onclick=async()=>{Q.aStu=stu;Q.aLesson=await getLesson(stu.id,Q.aDate);Q.aTab='plan';Q.scr='aLessonView';render();};
        row.appendChild(left);
        const right=mks('div','display:flex;align-items:center;gap:6px;flex-shrink:0;');
        if(l.planComment||l.resultComment)right.appendChild(mks('span','font-size:9px;font-weight:700;background:#f59e0b;color:#fff;padding:2px 6px;border-radius:20px;','💬'));
        right.appendChild(mk('span',SL_BADGE[l.status],SL[l.status]));
        const editBtn=mk('button','btn-sm','✏');
        editBtn.onclick=e=>{e.stopPropagation();Q.editStu=JSON.parse(JSON.stringify(stu));Q.scr='aStuEdit';Q.err='';render();};
        right.appendChild(editBtn);row.appendChild(right);sc.appendChild(row);cbody.appendChild(sc);
      });
      card.appendChild(cbody);
    }
    body.appendChild(card);
  };

  // 반별로 학생 분류
  classes.forEach(cls=>{
    const stuList=todayStu.filter(s=>s.classId===cls.id);
    renderClassCard(cls,stuList);
  });

  // 반 미배정 학생
  if(unassigned.length){
    renderClassCard({id:'__none__',name:'반 미배정'},unassigned);
  }

  // 오늘 수업 없는 학생
  if(otherStu.length){
    const tog=mk('button','tog-btn',Q.showAllStu?'▲ 다른 요일 학생 접기':`▼ 다른 요일 학생도 보기 (${otherStu.length}명)`);
    tog.onclick=()=>{Q.showAllStu=!Q.showAllStu;render();};body.appendChild(tog);
    if(Q.showAllStu){
      body.appendChild(mks('div','font-size:11px;color:#aaa;padding:8px 2px 4px;','다른 요일 학생'));
      otherStu.forEach(stu=>{
        const sc=mk('div','stu-card');sc.style.opacity='0.4';
        sc.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;',stu.name));
        body.appendChild(sc);
      });
    }
  }

  const hdr2=mks('div','display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.15);');body.appendChild(hdr2);
  const ab=mks('button','',Q.showAdd?'닫기':'+ 학생 추가');
  ab.style.cssText='flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#1a2f6e;border:1.5px solid #c7d2fe;font-family:inherit;';
  ab.onclick=()=>{Q.showAdd=Q.showAdd?false:'single';Q.showBulk=false;Q.err='';render();};hdr2.appendChild(ab);
  const ab2=mks('button','',Q.showBulk?'닫기':'+ 단체 추가');
  ab2.style.cssText='flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#1a2f6e;border:1.5px solid #c7d2fe;font-family:inherit;';
  ab2.onclick=()=>{Q.showBulk=!Q.showBulk;Q.showAdd=false;Q.err='';render();};hdr2.appendChild(ab2);

  if(Q.showAdd){
    const af=mk('div','add-form');body.appendChild(af);
    af.appendChild(mks('div','font-size:13px;font-weight:700;color:#111;margin-bottom:12px;','새 학생 추가'));
    af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','학생 이름'));
    const nn=document.createElement('input');nn.id='an';nn.className='inp';nn.placeholder='홍길동';af.appendChild(nn);
    af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','접근 코드 (숫자 4자리 권장)'));
    const nc=document.createElement('input');nc.id='ac';nc.className='inp';nc.placeholder='예: 1234';af.appendChild(nc);
    if(Q.classes&&Q.classes.length){
      af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','반 선택'));
      const cs=document.createElement('select');cs.id='acls';cs.className='inp';
      const opt0=document.createElement('option');opt0.value='';opt0.textContent='반 없음';cs.appendChild(opt0);
      Q.classes.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;cs.appendChild(o);});
      af.appendChild(cs);
    }
    af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','출석 요일 선택'));
    let selDays2=[];
    const dpWrap=mks('div','');af.appendChild(dpWrap);
    const reRDP=()=>{dpWrap.innerHTML='';dpWrap.appendChild(dayPicker(selDays2,ns=>{selDays2=ns;reRDP();}));};reRDP();
    if(Q.err)af.appendChild(mk('div','err',Q.err));
    const addBtn=mk('button','btn-primary','추가 완료');
    addBtn.onclick=async()=>{
      const n=(gid('an')?.value||'').trim(),c2=(gid('ac')?.value||'').trim();
      const classId=gid('acls')?.value||'';
      if(!n||!c2){Q.err='이름과 코드를 입력하세요.';render();return;}
      if(Q.students.find(s=>s.name===n)){Q.err='같은 이름의 학생이 이미 있습니다.';render();return;}
      Q.students.push({id:Date.now().toString(),name:n,code:c2,days:selDays2,classId});
      await saveStu();Q.showAdd=false;Q.err='';render();
    };af.appendChild(addBtn);
  }

  // 단체 추가
  if(Q.showBulk){
    const bf=mk('div','add-form');body.appendChild(bf);
    bf.appendChild(mks('div','font-size:13px;font-weight:700;color:#111;margin-bottom:12px;','단체 학생 추가'));

    // 반 선택
    bf.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','반 선택'));
    const bcs=document.createElement('select');bcs.className='inp';
    const bopt0=document.createElement('option');bopt0.value='';bopt0.textContent='반 없음';bcs.appendChild(bopt0);
    (Q.classes||[]).forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;bcs.appendChild(o);});
    bf.appendChild(bcs);

    // 레벨 선택
    bf.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','영어 수준 (공통)'));
    const blvl=document.createElement('select');blvl.className='inp';
    ['선택 안 함','M1','M2','M3','H1','H2','H3'].forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;blvl.appendChild(o);});

    // 출석 요일
    bf.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','출석 요일 (공통)'));
    let bulkDays=[];
    const bdpWrap=mks('div','');bf.appendChild(bdpWrap);
    const reRDP2=()=>{bdpWrap.innerHTML='';bdpWrap.appendChild(dayPicker(bulkDays,ns=>{bulkDays=ns;reRDP2();}));};reRDP2();

    // 학생 행
    bf.appendChild(mks('div','font-size:12px;color:#888;margin:10px 0 5px;','학생 목록'));
    const rows=[];
    const rowContainer=mks('div','');bf.appendChild(rowContainer);

    const addRow=(name='',code='')=>{
      const row={name,code};rows.push(row);
      const rd=mks('div','display:flex;gap:6px;margin-bottom:6px;align-items:center;');
      const ni=document.createElement('input');ni.className='inp';ni.style.cssText='margin-bottom:0;flex:2;';ni.placeholder='이름';ni.value=name;
      ni.oninput=()=>row.name=ni.value;
      const ci=document.createElement('input');ci.className='inp';ci.style.cssText='margin-bottom:0;flex:1;';ci.placeholder='코드';ci.value=code;
      ci.oninput=()=>row.code=ci.value;
      const delBtn=mks('button','font-size:14px;color:#dc2626;background:none;border:none;cursor:pointer;flex-shrink:0;','✕');
      delBtn.onclick=()=>{const idx=rows.indexOf(row);if(idx>=0)rows.splice(idx,1);rd.remove();};
      rd.appendChild(ni);rd.appendChild(ci);rd.appendChild(delBtn);
      rowContainer.appendChild(rd);
    };

    // 기본 3행
    addRow();addRow();addRow();

    const addRowBtn=mk('button','btn-ghost','+ 행 추가');
    addRowBtn.style.marginBottom='10px';
    addRowBtn.onclick=()=>addRow();
    bf.appendChild(addRowBtn);

    const bmsg=mks('div','');bf.appendChild(bmsg);
    const bulkSaveBtn=mk('button','btn-primary','전체 저장');
    bulkSaveBtn.onclick=async()=>{
      const valid=rows.filter(r=>r.name.trim()&&r.code.trim());
      if(!valid.length){bmsg.innerHTML='<div class="err">최소 1명의 이름과 코드를 입력하세요.</div>';return;}
      const dups=valid.filter(r=>Q.students.find(s=>s.name===r.name.trim()));
      if(dups.length){bmsg.innerHTML=`<div class="err">이미 있는 학생: ${dups.map(r=>r.name).join(', ')}</div>`;return;}
      bulkSaveBtn.textContent='저장 중...';bulkSaveBtn.disabled=true;
      const classId=bcs.value;const level=blvl.value;
      valid.forEach(r=>{
        Q.students.push({id:Date.now().toString()+'_'+Math.random().toString(36).slice(2),name:r.name.trim(),code:r.code.trim(),days:bulkDays,classId,level});
      });
      await saveStu();
      bmsg.innerHTML=`<div class="ok-msg">✓ ${valid.length}명 추가됐습니다!</div>`;
      setTimeout(()=>{Q.showBulk=false;render();},800);
    };
    bf.appendChild(bulkSaveBtn);
  }
}

    const vl=mks('div','');
    vl.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;','시청 가능 영상 설정'));

    await saveStu();

    setTimeout(()=>{Q.scr='aList';render();},700);
  };body.appendChild(saveBtn);

  body.appendChild(mks('div','margin-top:24px;border-top:1px solid #eee;padding-top:16px;'));
  body.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:8px;','위험 구역'));

}

  }
  body.appendChild(sec1);

  // ── 섹션 2: HOMEWORK ──────────────────────────
  const sec2=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px;margin-bottom:12px;');
  const s2hdr=mks('div','display:flex;align-items:center;gap:8px;margin-bottom:10px;');
  s2hdr.appendChild(mks('span','font-size:11px;font-weight:700;background:#0e9f6e;color:#fff;padding:3px 10px;border-radius:20px;','HOMEWORK'));

    ].join('\n');
    return '['+name+' DAILY REPORT]\n'
      +'안녕하세요 '+dateStr+' '+name+' 학생 DAILY REPORT 전달드립니다.\n\n'
      +'<CLASS 공지>\n'+classNotice+'\n\n'
      +'<HOMEWORK>\n'+homework+'\n\n'
      +'<TEST>\n'+scores+'\n\n'

      return;
    }
    // 학생 전화번호 확인
    const phone=Q.aStu.info?.phone||Q.aStu.phone||'';
    if(!phone){
      pubMsg.innerHTML='<div style="color:#dc2626;font-size:12px;padding:8px;background:#fef2f2;border-radius:8px;margin-bottom:8px;">⚠ 학생 정보에 전화번호가 없습니다. 학생 정보를 먼저 등록해주세요.</div>';
      return;
    }
    pubBtn.textContent='발송 중...';pubBtn.disabled=true;
    try{
      // 레슨 저장
      L.status='completed';L.parentVisible=true;
      await setLesson(Q.aStu.id,Q.aDate,L);
      // 문자 발송
      const smsText=genSMS();
      const result=await sendSolapi([{
        to:phone.replace(/-/g,''),
        from:SOLAPI_SENDER.replace(/-/g,''),
        text:smsText,
        type:smsText.length>90?'LMS':'SMS'
      }]);
      if(result.errorCode){
        throw new Error(result.errorMessage||'발송 실패');
      }
      pubMsg.innerHTML='<div class="ok-msg">✓ 알림문자가 발송됐습니다!</div>';

      pubBtn.textContent='📱 알림발송';pubBtn.disabled=false;
    }
  };body.appendChild(pubBtn);
}

  const checks={};
  const stuWrap=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:12px;margin-bottom:14px;');
  students.forEach(s=>{
    checks[s.id]=true;
    const row=mks('div','display:flex;align-items:center;gap:10px;padding:6px 0;');
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=true;
    cb.style.cssText='width:16px;height:16px;accent-color:#1a2f6e;cursor:pointer;flex-shrink:0;';

  const allCb=document.createElement('input');allCb.type='checkbox';allCb.checked=true;

// 학부모 코멘트 입력 박스 (탭별)
function pCommentBox(L,field,sid,date){
  const cb=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:14px;margin-top:12px;');
  cb.appendChild(mks('div','font-size:12px;font-weight:700;color:#1a2f6e;margin-bottom:10px;','💬 학부모 코멘트'));

  const saved=L[field];

  // 저장된 코멘트 보기 (수정/삭제)
  if(saved&&!L[field+'_editing']){
    cb.appendChild(mks('div','font-size:13px;color:#333;line-height:1.6;background:#f8f8f6;border-radius:8px;padding:10px 12px;margin-bottom:10px;',saved));
    const btnRow=mks('div','display:flex;gap:8px;');
    const editBtn=mk('button','btn-ghost','수정');
    const delBtn=mk('button','btn-ghost','삭제');
    delBtn.style.color='#dc2626';delBtn.style.borderColor='#fca5a5';
    editBtn.onclick=()=>{L[field+'_editing']=true;cb.parentNode.replaceChild(pCommentBox(L,field,sid,date),cb);};
    delBtn.onclick=async()=>{
      if(!confirm('코멘트를 삭제할까요?'))return;
      L[field]='';delete L[field+'_editing'];
      await setLesson(sid,date,L);

async function pChart(){

  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;',stuDisplayName(Q.pStu)+' 수업 현황'));

  // 이번 달 전체 날짜 로드
  const now=new Date();
  const year=now.getFullYear(),month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const allMonthDates=[];
  for(let d=1;d<=daysInMonth;d++){
    const dd=String(d).padStart(2,'0'),mm=String(month+1).padStart(2,'0');
    allMonthDates.push(`${year}-${mm}-${dd}`);
  }
  // 로딩 표시
  body.appendChild(mks('div','font-size:12px;color:#aaa;text-align:center;padding:20px;','데이터 불러오는 중...'));

  // 학생 전체 레슨 한 번에 로드 (30번 → 1번)
  const allLessonsRaw=await fbGet(`lessons/${Q.pStu.id}`)||{};
  const lessonCache={};
  allMonthDates.forEach(d=>{
    const key=d.replace(/-/g,'_');
    lessonCache[d]=allLessonsRaw[key]||emL();
    // 메모리 캐시에도 저장
    MEM.lessons[`${Q.pStu.id}__${d}`]=lessonCache[d];
  });

  body.innerHTML='';

  // ① 단어시험 그래프 (통과/불통 있는 날만)
  // 단어시험: 점수 또는 통과/불통 있는 날짜 모두 포함
  const vocabDates=allMonthDates.filter(d=>lessonCache[d]?.vocab&&(lessonCache[d].vocab.score||lessonCache[d].vocab.pass));

  if(vocabDates.length){
    const vw=mk('div','chart-wrap');body.appendChild(vw);
    vw.appendChild(mks('div','font-size:12px;font-weight:600;color:#333;margin-bottom:12px;','단어시험 추이'));
    vocabDates.forEach(d=>{
      const v=lessonCache[d].vocab;
      const pass=v.pass==='pass';
      const fail=v.pass==='fail';
      const barColor=pass?'#16a34a':fail?'#dc2626':'#93c5fd';
      const row=mk('div','chart-bar-row');
      row.style.marginBottom='5px';
      row.appendChild(mks('div','font-size:10px;color:#888;width:44px;flex-shrink:0;text-align:right;',fdShort(d)));
      const bg=mks('div','flex:1;background:#f0f0ee;border-radius:3px;height:16px;overflow:hidden;margin-left:8px;');
      const pct=v.score?Math.min(Number(v.score),100):100;
      const fill=mks('div',`height:100%;border-radius:3px;background:${barColor};width:${pct}%;`,'');
      bg.appendChild(fill);row.appendChild(bg);
      // 점수
      if(v.score)row.appendChild(mks('div','font-size:10px;color:#555;font-weight:700;margin-left:6px;min-width:28px;',v.score+'점'));
      // 통과/불통 배지

        row.appendChild(badge);
      }
      vw.appendChild(row);
    });
  }

  // ② 완성도 그래프
  const RC3={'완료':'#16a34a','부분완료':'#f59e0b','미완료':'#dc2626'};
  const RV3={'완료':3,'부분완료':2,'미완료':1};
  const dates=allMonthDates.filter(d=>lessonCache[d]?.status==='completed'&&lessonCache[d]?.parentVisible);

      const l=lessonCache[d];
      // Learning, Acquisition만 (fix 제외)
      const vals=LK.filter(k=>k!=='fix').map(k=>l.res[k]?.r).filter(v=>v);
      if(!vals.length)return;
      const scores=vals.map(v=>RV3[v]||0);
      const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
      const pct=Math.round((avg/3)*100);
      const color=avg>=2.5?RC3['완료']:avg>=1.5?RC3['부분완료']:RC3['미완료'];
      const label=avg>=2.5?'완료':avg>=1.5?'부분완료':'미완료';
      const row=mk('div','chart-bar-row');
      row.style.marginBottom='5px';

      const bg=mks('div','flex:1;background:#f0f0ee;border-radius:3px;height:16px;overflow:hidden;margin-left:8px;');
      const fill=mks('div',`height:100%;border-radius:3px;background:${color};width:${pct}%;display:flex;align-items:center;justify-content:center;min-width:36px;`,'');
      fill.appendChild(mks('span','font-size:9px;font-weight:700;color:#fff;',label));

    // ③ 항목별 (L, A만)
    const cw2=mk('div','chart-wrap');body.appendChild(cw2);
    cw2.appendChild(mks('div','font-size:12px;font-weight:600;color:#333;margin-bottom:12px;','항목별 학습 현황'));
    LK.filter(k=>k!=='fix').forEach((k,i)=>{
      const vals=dates.map(d=>lessonCache[d]?.res[k]?.r).filter(v=>v);
      if(!vals.length)return;
      const scores=vals.map(v=>RV3[v]||0);
      const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
      const pct=Math.round((avg/3)*100);
      const color=avg>=2.5?RC3['완료']:avg>=1.5?RC3['부분완료']:RC3['미완료'];
      const label=avg>=2.5?'완료':avg>=1.5?'부분완료':'미완료';
      const row=mk('div','chart-bar-row');
      row.style.marginBottom='5px';
      row.appendChild(mks('div','font-size:10px;color:#888;width:44px;flex-shrink:0;text-align:right;',['L','A'][i]));
      const bg=mks('div','flex:1;background:#f0f0ee;border-radius:3px;height:16px;overflow:hidden;margin-left:8px;');
      const fill=mks('div',`height:100%;border-radius:3px;background:${color};width:${pct}%;display:flex;align-items:center;justify-content:center;min-width:36px;`,'');
      fill.appendChild(mks('span','font-size:9px;font-weight:700;color:#fff;',label));
      bg.appendChild(fill);row.appendChild(bg);
      cw2.appendChild(row);
    });
  }

  // ④ 복습 퀴즈 누적 결과
  const allQuizRaw=await fbGet(`quizResults/${Q.pStu.id}`)||{};
  const quizDates=Object.keys(allQuizRaw).sort();
  if(quizDates.length){
    const qw=mk('div','chart-wrap');body.appendChild(qw);
    qw.appendChild(mks('div','font-size:12px;font-weight:600;color:#333;margin-bottom:12px;','📝 복습 퀴즈 점수'));
    quizDates.forEach(d=>{
      const r=allQuizRaw[d];
      const pct=r.score||0;
      const color=pct>=80?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
      const row=mk('div','chart-bar-row');row.style.marginBottom='5px';

      const fill=mks('div',`height:100%;border-radius:3px;background:${color};width:${pct}%;display:flex;align-items:center;justify-content:center;min-width:30px;`,'');
      fill.appendChild(mks('span','font-size:9px;font-weight:700;color:#fff;',pct+'점'));
      bg.appendChild(fill);row.appendChild(bg);

    // 평균 점수
    const avg=Math.round(quizDates.reduce((a,d)=>a+(allQuizRaw[d].score||0),0)/quizDates.length);
    const avgColor=avg>=80?'#16a34a':avg>=60?'#f59e0b':'#dc2626';
    qw.appendChild(mks('div',`font-size:11px;font-weight:700;color:${avgColor};text-align:right;margin-top:6px;`,`평균 ${avg}점 (${quizDates.length}회)`));
  }
}

// 솔라피 단체 문자 발송 API 호출
async function sendSolapi(messages){
  const date=new Date().toISOString();
  const salt=Math.random().toString(36).slice(2,12);
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(SOLAPI_SECRET),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',key,enc.encode(date+salt));
  const sigHex=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const auth=`HMAC-SHA256 apiKey=${SOLAPI_KEY}, date=${date}, salt=${salt}, signature=${sigHex}`;
  const res=await fetch('https://api.solapi.com/messages/v4/send-many',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':auth},
    body:JSON.stringify({messages})
  });
  return res.json();
}

// 공지 작성/수정 (관리자 전용)
async function noticeWrite(){
  const editing=Q._editNotice;
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='noticeList';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;',editing?'공지 수정':'공지 작성'));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  const c=mk('div','card');body.appendChild(c);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','제목'));
  const ti=document.createElement('input');ti.className='inp';ti.placeholder='공지 제목을 입력하세요';
  if(editing)ti.value=editing.title;c.appendChild(ti);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','내용'));
  const ta=document.createElement('textarea');ta.className='section-ta';ta.rows=5;ta.placeholder='공지 내용을 입력하세요 (선택사항)';ta.style.marginBottom='10px';
  if(editing)ta.value=editing.content||'';c.appendChild(ta);
  const msg=mks('div','');c.appendChild(msg);
  const btn=mk('button','btn-primary',editing?'수정 완료':'공지 등록');
  btn.onclick=async()=>{
    const title=ti.value.trim();
    if(!title){msg.innerHTML='<div class="err">제목을 입력하세요.</div>';return;}
    btn.textContent='저장 중...';btn.disabled=true;
    if(!Q.notices)Q.notices=[];
    if(editing){
      const idx=Q.notices.findIndex(x=>x.id===editing.id);
      if(idx>=0){Q.notices[idx].title=title;Q.notices[idx].content=ta.value.trim();}
    } else {
      Q.notices.unshift({id:Date.now().toString(),title,content:ta.value.trim(),createdAt:Date.now()});
    }
    await saveNotices();
    msg.innerHTML='<div class="ok-msg">✓ 저장되었습니다!</div>';
    setTimeout(()=>{Q.scr='noticeList';render();},700);
  };c.appendChild(btn);
}

  const clsSel=document.createElement('select');
  clsSel.style.cssText=`flex:1;height:38px;border-radius:50px;background:rgba(255,255,255,0.9);border:1.5px solid rgba(180,200,255,0.6);padding:0 14px;font-size:13px;color:#1a2f7a;outline:none;font-family:${CF};`;

  (Q.classes||[]).forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name;if(Q._lClass===c.id)o.selected=true;clsSel.appendChild(o);});

  const enterBtn=mks('button','','Enter');
  enterBtn.style.cssText=`height:38px;padding:0 16px;border-radius:50px;background:linear-gradient(180deg,#5b9ef8,#2060e8 70%,#1a4fd6);border:none;box-shadow:0 3px 0 #1440a0;font-size:13px;color:#fff;cursor:pointer;font-family:${CF};white-space:nowrap;`;
  enterBtn.onclick=()=>{Q._lClass=clsSel.value;Q._scanOpen=false;render();};

  const scanBtn=mks('button','','📷 채점');
  scanBtn.style.cssText=`height:38px;padding:0 14px;border-radius:50px;background:linear-gradient(180deg,#a78bfa,#7c3aed 70%,#6d28d9);border:none;box-shadow:0 3px 0 #4c1d95;font-size:13px;color:#fff;cursor:pointer;font-family:${CF};white-space:nowrap;`;
  scanBtn.onclick=()=>{
    const gradingUrl='https://kkjenglish.vercel.app/grading.html?code=KKJENGLISH&start=1';
    const popup=window.open(gradingUrl,'KKJ_GRADING','width=480,height=800,scrollbars=yes');
    if(!popup){
      window.open(gradingUrl,'_blank');
    }
    // 결과 수신 리스너
    const handler=(e)=>{
      if(e.data?.type!=='KKJ_GRADE_RESULT')return;
      const {student,score,total,pct,verdict,keyName}=e.data;
      // 해당 학생 찾기
      const stu=Q.students.find(s=>s.name===student);
      if(!stu){
        alert(`"${student}" 학생을 찾을 수 없어요. 학생 이름을 확인해주세요.`);
        return;
      }
      // 점수 저장
      if(!Q._lScores)Q._lScores={};
      if(!Q._lScores[stu.id])Q._lScores[stu.id]={};
      // 시험 종류 자동 매핑
      const kn=(keyName||'').toLowerCase();
      let key='B';
      if(kn.includes('단어')||kn.includes('word'))key='word';
      else if(kn.includes('영작')||kn.includes('writ'))key='write';
      else if(kn.includes('독해')||kn.includes('read'))key='read';
      else if(kn.includes('b-test')||kn.includes('btest'))key='B';
      else if(kn.includes('o-test')||kn.includes('otest'))key='O';
      else if(kn.includes('d-test')||kn.includes('dtest'))key='D';
      Q._lScores[stu.id][key]=pct;
      // Firebase 저장
      getLesson(stu.id,TODAY).then(l=>{
        const keyMap={B:'bTest',O:'oTest',D:'dTest',word:'wordTest',write:'writeTest',read:'readTest'};
        l[keyMap[key]]=pct;
        fbSet(`lessons/${stu.id}/${TODAY.replace(/-/g,'_')}`,l);
      });
      // 해당 학생 카드 열기
      Q[`_lOpen_${stu.id}`]=true;
      render();
      // 토스트 메시지
      const toast=mks('div',`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2f7a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);`,`✓ ${student} ${key}-test ${pct}점 입력됨`);
      toast.style.fontFamily=CF;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(),3000);
      window.removeEventListener('message',handler);
    };
    window.addEventListener('message',handler);
  };

  selRow.appendChild(clsSel);selRow.appendChild(enterBtn);selRow.appendChild(scanBtn);
  topCard.appendChild(selRow);

  // 학생 리스트
  if(!Q._lClass){
    w.appendChild(mks('div','border-radius:14px;background:rgba(255,255,255,0.3);border:1.5px solid rgba(255,255,255,0.6);padding:24px;text-align:center;color:rgba(10,26,92,0.5);font-size:13px;','반을 선택하고 Enter를 눌러주세요'));

  const clsStudents=Q.students.filter(s=>s.classId===Q._lClass);
  if(!clsStudents.length){
    w.appendChild(mks('div','border-radius:14px;background:rgba(255,255,255,0.3);border:1.5px solid rgba(255,255,255,0.6);padding:24px;text-align:center;color:rgba(10,26,92,0.5);font-size:13px;','이 반에 학생이 없어요'));

    // 이름 행

// 학생 조회 (학부모 조회와 동일)
// 퀴즈 결과 상세 (관리자/학습리더용)
async function quizResult(){
  const stu=Q._quizResultStu;
  const date=Q._quizResultDate;
  const fromLeader=Q.lLeader!=null;
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');
  bb.onclick=()=>{Q.scr=fromLeader?'lLessonView':'aLessonView';render();};
  hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;','📝 퀴즈 결과'));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;',stuDisplayName(stu)+' · '+fd(date)));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);

  body.appendChild(mks('div','font-size:12px;color:#aaa;text-align:center;padding:12px;','불러오는 중...'));

  // 해당 학생의 모든 퀴즈 결과 날짜 목록
  const allResults=await fbGet(`quizResults/${stu.id}`)||{};
  const resultDates=Object.keys(allResults).sort().reverse();
  body.innerHTML='';

  if(!resultDates.length){
    body.appendChild(mk('div','empty-box','퀴즈 제출 기록이 없어요.'));return;
  }

  // 날짜 드롭다운
  if(!Q._quizResultDate||!allResults[Q._quizResultDate])Q._quizResultDate=resultDates[0];
  const ds=document.createElement('select');ds.className='inp';
  resultDates.forEach(d=>{
    const o=document.createElement('option');o.value=d;o.textContent=fd(d);
    if(d===Q._quizResultDate)o.selected=true;ds.appendChild(o);
  });
  ds.onchange=()=>{Q._quizResultDate=ds.value;Q.scr='quizResult';render();};
  body.appendChild(ds);

  const result=allResults[Q._quizResultDate];

  // 요약 카드
  const color=result.score>=80?'#16a34a':result.score>=60?'#f59e0b':'#dc2626';
  const summary=mk('div','card');summary.style.textAlign='center';summary.style.padding='1.2rem 0';
  summary.innerHTML=`
    <div style="font-size:40px;font-weight:800;color:${color};">${result.score}점</div>
    <div style="font-size:13px;color:#888;margin-top:6px;">${result.total}문제 중 ${result.correct}개 정답</div>
    <div style="font-size:10px;color:#bbb;margin-top:4px;">제출: ${new Date(result.submittedAt).toLocaleString('ko-KR')}</div>
  `;
  body.appendChild(summary);

  // 문제별 정답/오답 + 해설 + 정답 수정
  const OPTS=['① 1개','② 2개','③ 3개','④ 4개','⑤ 5개'];
  const editedAns={...result.questions.reduce((a,_,i)=>({...a,[i]:result.questions[i].ans}),{})};

  result.questions.forEach((q,i)=>{
    const isCorrect=result.answers[i]===q.ans;
    const card=mks('div',`background:#fff;border:1.5px solid ${isCorrect?'#bbf7d0':'#fecaca'};border-radius:12px;padding:14px;margin-bottom:10px;`);
    card.appendChild(mks('div',`font-size:12px;font-weight:700;color:${isCorrect?'#16a34a':'#dc2626'};margin-bottom:8px;`,(isCorrect?'✓ 정답':'✗ 오답')+` — Q${i+1}`));
    q.sentences.forEach(s=>card.appendChild(mks('div','font-size:12px;color:#333;padding:2px 0;line-height:1.6;',s)));

    // 정답 표시 + 수정 드롭다운
    const ansRow=mks('div','display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center;');
    OPTS.forEach((opt,j)=>{
      const isAns=j===q.ans,isSel=result.answers[i]===j;
      const bg=isAns?'#16a34a':isSel&&!isAns?'#fecaca':'#f5f5f5';
      const col=isAns?'#fff':isSel&&!isAns?'#dc2626':'#888';
      ansRow.appendChild(mks('span',`font-size:11px;padding:3px 8px;border-radius:8px;background:${bg};color:${col};font-weight:${isAns?700:400};`,opt+(isAns?' ✓ 정답':'')+(isSel&&!isAns?' ← 학생':'')));
    });
    card.appendChild(ansRow);

    // 관리자 정답 수정
    const editRow=mks('div','display:flex;align-items:center;gap:8px;margin-top:10px;background:#fffbeb;border-radius:8px;padding:8px 10px;');
    editRow.appendChild(mks('div','font-size:11px;color:#92400e;flex-shrink:0;','✏️ 정답 수정:'));
    const sel=document.createElement('select');sel.className='inp';sel.style.cssText='margin-bottom:0;padding:4px 8px;font-size:12px;';
    OPTS.forEach((opt,j)=>{const o=document.createElement('option');o.value=j;o.textContent=opt;if(j===q.ans)o.selected=true;sel.appendChild(o);});
    sel.onchange=()=>{editedAns[i]=parseInt(sel.value);};
    editRow.appendChild(sel);
    const saveAnsBtn=mk('button','btn-primary','저장');
    saveAnsBtn.style.cssText='padding:6px 12px;font-size:11px;margin-top:0;width:auto;';
    saveAnsBtn.onclick=async()=>{
      // 캐시 문제 정답 수정
      const cacheKey='quizCache/'+((Q._quizResultStu.level||'M3')+'_'+(date.replace(/-/g,'')));
      const cached=await fbGet(cacheKey);
      if(cached&&cached.questions){
        cached.questions[i].ans=editedAns[i];
        cached.questions[i].correct_count=editedAns[i]+1;
        await fbSet(cacheKey,cached);
      }
      saveAnsBtn.textContent='✓';setTimeout(()=>{saveAnsBtn.textContent='저장';},1000);
    };
    editRow.appendChild(saveAnsBtn);
    card.appendChild(editRow);

    if(q.exp)card.appendChild(mks('div','font-size:11px;color:#3b5bdb;background:#eef2ff;padding:8px 10px;border-radius:8px;margin-top:10px;line-height:1.7;','💡 '+q.exp));
    body.appendChild(card);
  });
}

    const n=(gid('sn')?.value||'').trim(),code=(gid('sc')?.value||'').trim();
    const stu=Q.students.find(s=>s.name===n&&s.code===code);
    if(!stu){document.getElementById('s-err').innerHTML='<div class="err">이름 또는 코드가 맞지 않습니다.</div>';return;}
    Q.sStu=stu;Q.pStu=stu;Q.pDate=TODAY;Q.pLesson=await getLesson(stu.id,TODAY);Q.scr='sView';render();
  };
  ci.onkeydown=e=>{if(e.key==='Enter')doS();};
  mk('button','btn-primary','조회하기').onclick=doS;c.appendChild(c.lastChild||mk('button','btn-primary','조회하기'));
  const btn2=mk('button','btn-primary','조회하기');btn2.onclick=doS;c.appendChild(btn2);
}

// 학생 메인 화면
async function sView(){
  const stu=Q.sStu;
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='home';render();};hdr.appendChild(bb);
  const ph=mks('div','display:flex;justify-content:space-between;align-items:center;');
  ph.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;',stu.name));
  const lo=mk('button','logout-btn','로그아웃');
  lo.onclick=()=>{Q.sStu=null;Q.pStu=null;Q.scr='sLogin';render();};ph.appendChild(lo);
  hdr.appendChild(ph);w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);

  // 복습 박스
  const qbox=mks('div','background:linear-gradient(135deg,#3b5bdb,#6d28d9);border-radius:14px;padding:16px;margin-bottom:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;');
  const ql=mks('div','');
  ql.appendChild(mks('div','font-size:14px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;','📝 복습 퀴즈'));
  ql.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px;','지난 수업 내용으로 AI가 문제를 만들어요'));
  qbox.appendChild(ql);
  qbox.appendChild(mks('span','font-size:20px;color:rgba(255,255,255,0.8);','›'));
  qbox.onclick=async()=>{await startQuiz(stu);};
  body.appendChild(qbox);

  // 날짜 드롭다운
  const now=new Date();const year=now.getFullYear(),month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthDates=[];
  for(let d=daysInMonth;d>=1;d--){
    const dd=String(d).padStart(2,'0'),mm=String(month+1).padStart(2,'0');
    monthDates.push(`${year}-${mm}-${dd}`);
  }
  const ds=document.createElement('select');ds.className='inp';
  monthDates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=fd(d)+(d===TODAY?' (오늘)':'');if(d===Q.pDate)o.selected=true;ds.appendChild(o);});
  ds.onchange=async()=>{Q.pDate=ds.value;Q.pLesson=await getLesson(stu.id,Q.pDate);render();};
  body.appendChild(ds);

  const L=Q.pLesson;
  if(L.status==='none'){body.appendChild(mk('div','empty-box','이 날의 수업 기록이 없습니다.'));return;}
  const hasAnyResult=L.status==='completed'&&LK.some(k=>L.res[k]?.r);
  if(hasAnyResult){
    const tabs=mk('div','tab-wrap');body.appendChild(tabs);
    ['plan','result'].forEach(t=>{
      if(!Q.pTab)Q.pTab='plan';
      const tb=mk('button','tab-btn'+(Q.pTab===t?' active':''),t==='plan'?'오늘 배울 내용':'수업 결과');
      tb.onclick=()=>{Q.pTab=t;render();};tabs.appendChild(tb);
    });
  }
  if(Q.pTab==='result'&&hasAnyResult){
    body.appendChild(mks('div','font-size:12px;font-weight:700;color:#059669;margin-bottom:12px;padding:10px 14px;background:#ecfdf5;border-radius:10px;','✅ 수업 결과'));
    LK.forEach((k,i)=>body.appendChild(sectionBlockROFiltered(LABELS[i],L.plan[k],L.res[k],true,L,k,L.parentVisible)));
  } else {
    LK.forEach((k,i)=>body.appendChild(sectionBlockRO(LABELS[i],L.plan[k],null,false,null,k)));
  }
}

// 퀴즈 시작 — AI 문제 생성
async function startQuiz(stu){
  Q.quiz=null;Q.quizAnswers={};Q.quizDone=false;Q.scr='quizScreen';render();

  // 지난 수업 찾기
  const dates=await getDates(stu.id);
  const pastDate=dates.find(d=>d<TODAY);
  if(!pastDate){Q.quiz={error:'아직 지난 수업 기록이 없어요.'};render();return;}
  const L=await getLesson(stu.id,pastDate);
  if(L.status==='none'){Q.quiz={error:'지난 수업 내용이 없어요.'};render();return;}

  const level=stu.level||'M3';
  const levelGuide={
    'M1':'현재/과거시제, be동사, 일반동사, 의문문, 부정문 등 기초 문법',
    'M2':'현재진행, 미래시제, 조동사(can/will/must), 비교급, to부정사 기초',
    'M3':'to부정사/동명사, 관계대명사(who/which/that), 수동태, 현재완료 기초',
    'H1':'관계대명사 심화, 분사, 가정법 기초, 수동태 심화, 접속사',
    'H2':'가정법 심화, 분사구문, 도치, 강조구문, 복합관계사',
    'H3':'수능 문법 전 범위, 어법상 틀린 것 찾기, 고난도 구문'
  };
  const levelHint=levelGuide[level]||levelGuide['M3'];

  const content=LK.map((k,i)=>LABELS[i].split('—')[0].trim()+': '+L.plan[k]).filter(s=>s.split(': ')[1]).join('\n');

  // 캐시 키: 레벨 + 날짜 + 내용 해시
  const contentHash=content.split('').reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0);
  const cacheKey=`quizCache_${level}_${pastDate}_${Math.abs(contentHash)}`;

  // Firebase 캐시 확인
  const cached=await fbGet(cacheKey.replace(/_/g,'/').replace('quizCache/','quizCache_').replace(/\//g,'_'));
  // 실제로는 간단히 key 형태로 저장
  const cachedData=await fbGet('quizCache/'+level+'_'+pastDate.replace(/-/g,''));
  if(cachedData&&cachedData.content===content&&cachedData.questions){
    Q.quiz={questions:cachedData.questions,date:pastDate,fromCache:true};
    render();return;
  }

  // 과거 좋은 문제 예시 가져오기 (Few-shot)
  const pastExamples=await fbGet('quizExamples/'+level);
  let fewShot='';
  if(pastExamples&&Array.isArray(pastExamples)&&pastExamples.length>0){
    const ex=pastExamples[0];
    fewShot=`\n\n좋은 문제 예시:\n${JSON.stringify(ex,null,2)}`;
  }

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':CLAUDE_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2500,
        messages:[{role:'user',content:`너는 한국 중고등학교 영어 내신/수능 문법 출제 전문가야. 아래 수업 내용을 바탕으로 문법 문제 5개를 만들어줘.

학생 수준: ${level} (${levelHint})

수업 내용:
${content}${fewShot}

【문제 형식】
각 문제마다 영어 문장 6개(ⓐ~ⓕ)를 제시하고, 그 중 문법상 옳은 문장의 개수를 고르는 형식.
선택지는 항상 "1개 / 2개 / 3개 / 4개 / 5개" 5가지.

【제작 규칙】
- 6문장 중 정답(옳은 문장) 개수는 문제마다 다르게 (1~5개 랜덤, 5문제에 걸쳐 고르게 분포)
- 수업한 문법 포인트를 중심으로 오류 문장 제작
- 틀린 문장은 해당 레벨 학생이 자주 틀리는 오류 유형 반영
- 옳은 문장과 틀린 문장이 섞여서 헷갈리게 구성
- exp에 각 문장별 정오 이유를 간결하게 설명 (ⓐ: O - 이유, ⓑ: X - 이유 형식)

【출력 형식】 JSON만, 코드블록 없이:
[
  {
    "sentences": [
      "ⓐ She has lived here since 2010.",
      "ⓑ I am knowing the answer.",
      "ⓒ He suggested that she goes there.",
      "ⓓ The movie which I watched was boring.",
      "ⓔ They have been married for 20 years.",
      "ⓕ She didn't went to school yesterday."
    ],
    "correct_count": 3,
    "ans": 2,
    "exp": "ⓐ O(현재완료 since), ⓑ X(know는 상태동사), ⓒ X(suggest+that절→should go/go), ⓓ O(목적격 관계대명사), ⓔ O(현재완료 for), ⓕ X(didn't+동사원형→go)"
  }
]

(ans는 정답 인덱스: 1개=0, 2개=1, 3개=2, 4개=3, 5개=4)`}]
      })
    });
    if(!res.ok){
      const errText=await res.text();
      console.error('API 오류:', res.status, errText);
      Q.quiz={error:`API 오류 (${res.status}): ${errText.slice(0,200)}`};render();return;
    }
    const data=await res.json();
    const text=data.content[0].text.trim();
    const json=JSON.parse(text.replace(/```json|```/g,'').trim());
    Q.quiz={questions:json,date:pastDate};

    // Firebase에 캐시 저장 (같은 레벨+날짜+내용이면 재사용)
    await fbSet('quizCache/'+level+'_'+pastDate.replace(/-/g,''),{content,questions:json,level,date:pastDate});

    // 예시 문제 저장 (최대 3개 유지 — few-shot용)
    const prevExamples=await fbGet('quizExamples/'+level)||[];
    const newExamples=[json[0],...(Array.isArray(prevExamples)?prevExamples:[])].slice(0,3);
    await fbSet('quizExamples/'+level,newExamples);
  } catch(e){
    console.error('퀴즈 오류:', e);
    Q.quiz={error:`오류: ${e.message}`};
  }
  render();
}

// 퀴즈 화면
function quizScreen(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='sView';Q.quiz=null;Q.quizDone=false;render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;','📝 복습 퀴즈'));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);

  if(!Q.quiz){
    body.appendChild(mks('div','text-align:center;padding:3rem 1rem;',''));
    body.lastChild.innerHTML='<div style="font-size:13px;color:#aaa;margin-bottom:16px;">AI가 문제를 만들고 있어요...</div><div style="font-size:28px;">⏳</div>';
    return;
  }
  if(Q.quiz.error){body.appendChild(mk('div','empty-box',Q.quiz.error));return;}

  const qs=Q.quiz.questions;
  const OPTS=['① 1개','② 2개','③ 3개','④ 4개','⑤ 5개'];

  if(Q.quizDone){
    // 학생 결과 — 점수만 표시 (정답/해설 없음)
    const correct=qs.filter((q,i)=>Q.quizAnswers[i]===q.ans).length;
    const pct=Math.round(correct/qs.length*100);
    const color=pct>=80?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
    const rc=mk('div','card');rc.style.textAlign='center';rc.style.padding='2rem 0';
    rc.innerHTML=`
      <div style="font-size:52px;font-weight:800;color:${color};">${pct}점</div>
      <div style="font-size:14px;color:#888;margin-top:8px;">${qs.length}문제 중 ${correct}개 정답</div>
      <div style="font-size:11px;color:#bbb;margin-top:12px;">정답은 선생님께 문의해주세요 😊</div>
    `;
    body.appendChild(rc);
    const retryBtn=mk('button','btn-ghost','← 돌아가기');
    retryBtn.style.marginTop='8px';
    retryBtn.onclick=()=>{Q.scr='sView';Q.quiz=null;Q.quizDone=false;render();};
    body.appendChild(retryBtn);
    return;
  }

  // 문제 풀기 화면
  body.appendChild(mks('div','font-size:11px;color:#aaa;margin-bottom:14px;',`${fd(Q.quiz.date)} 수업 기반 · ${Q.quiz.fromCache?'📦 저장된 문제':'🤖 AI 생성'}`));
  qs.forEach((q,i)=>{
    const card=mk('div','section-block');
    card.appendChild(mks('div','font-size:13px;font-weight:700;color:#1a2f6e;margin-bottom:10px;',`Q${i+1}. 다음 중 문법상 옳은 문장의 개수는?`));
    // 6문장
    const sentBox=mks('div','background:#f8f8f6;border-radius:10px;padding:12px;margin-bottom:12px;');
    q.sentences.forEach(s=>{
      sentBox.appendChild(mks('div','font-size:13px;color:#333;padding:3px 0;line-height:1.7;',s));
    });
    card.appendChild(sentBox);
    // 선택지 — 5개 균등 배치 (줄바꿈 방지)
    const optRow=mks('div','display:grid;grid-template-columns:repeat(5,1fr);gap:4px;');
    OPTS.forEach((opt,j)=>{
      const sel=Q.quizAnswers[i]===j;
      const btn=mks('button',`padding:6px 0;border-radius:8px;border:1.5px solid ${sel?'#3b5bdb':'#e8e8e6'};background:${sel?'#eef2ff':'#fff'};cursor:pointer;font-size:11px;font-weight:${sel?700:400};color:${sel?'#1a2f6e':'#555'};font-family:inherit;text-align:center;width:100%;white-space:nowrap;`,opt);
      btn.onclick=()=>{Q.quizAnswers[i]=j;render();};
      optRow.appendChild(btn);
    });
    card.appendChild(optRow);
    body.appendChild(card);
  });

  const allAnswered=qs.every((_,i)=>Q.quizAnswers[i]!==undefined);
  const submitBtn=mk('button','btn-primary','제출하기');
  if(!allAnswered){submitBtn.disabled=true;submitBtn.style.opacity='0.5';}
  submitBtn.onclick=async()=>{
    const correct=qs.filter((q,i)=>Q.quizAnswers[i]===q.ans).length;
    const pct=Math.round(correct/qs.length*100);
    // Firebase에 결과 저장
    const resultData={
      studentId:Q.sStu.id,studentName:Q.sStu.name,level:Q.sStu.level||'',
      date:Q.quiz.date,submittedAt:new Date().toISOString(),
      answers:Q.quizAnswers,correct,total:qs.length,score:pct,
      questions:qs
    };
    await fbSet(`quizResults/${Q.sStu.id}/${Q.quiz.date}`,resultData);
    Q.quizDone=true;render();
  };
  body.appendChild(submitBtn);
  if(!allAnswered)body.appendChild(mks('div','font-size:11px;color:#aaa;text-align:center;margin-top:8px;',`${Object.keys(Q.quizAnswers).length}/${qs.length}문제 답 선택됨`));
}
(async()=>{
  A.innerHTML='';
  try{
    await initData();
  }catch(e){
    console.error('initData 오류:',e);
  }
  Q.students=MEM.stu;Q.pw=MEM.pw;Q.videos=MEM.videos;Q.notices=MEM.notices;Q.classes=MEM.classes;Q.leaders=MEM.leaders;
  render();
})();
})();
</script>
