<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>김기준영어학원 수업 관리</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f0ee;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:0;}
  #app{width:100%;max-width:480px;min-height:100vh;background:#f0f0ee;padding-top:40px;}
  input,select,textarea,button{font-family:inherit;}
  /* 네이비 상단 헤더 */
  .page-header{background:#1a2f6e;padding:20px 20px 24px;position:relative;border-radius:20px;margin:12px 12px 0;}
  .page-header-sub{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:.08em;margin-bottom:4px;}
  .page-header-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px;}
  .page-header-desc{font-size:11px;color:rgba(255,255,255,0.5);}
  .page-header-back{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;padding:0 0 12px;display:block;}
  .page-header-row{display:flex;justify-content:space-between;align-items:flex-end;}
  /* 컨텐츠 영역 */
  .page-body{padding:16px;}
  .card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:1rem 1.25rem;margin-bottom:12px;}
  /* 버튼 */
  .btn-primary{background:#1a2f6e;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
  .btn-primary:hover{background:#1e3a8a;}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-danger{background:#dc2626;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
  .btn-danger:hover{background:#b91c1c;}
  .btn-back{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;padding:0 0 12px;display:block;}
  .btn-back-dark{background:transparent;border:none;color:#888;font-size:12px;cursor:pointer;padding:0 0 14px;display:block;}
  .btn-ghost{background:transparent;border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#444;}
  .btn-ghost:hover{background:#f0f0ee;}
  .btn-ghost-inv{background:rgba(255,255,255,0.15);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#fff;}
  .btn-ghost-inv:hover{background:rgba(255,255,255,0.25);}
  .btn-sm{background:#f5f5f3;border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:#666;}
  .btn-sm:hover{background:#e8e8e6;}
  /* 입력 */
  .inp{width:100%;border:1.5px solid #e8e8e6;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;color:#111;margin-bottom:10px;display:block;}
  .inp:focus{outline:none;border-color:#1a2f6e;}
  .err{color:#dc2626;font-size:12px;margin-bottom:8px;padding:8px 10px;background:#fef2f2;border-radius:8px;}
  /* 섹션 블록 */
  .section-block{margin-bottom:10px;background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e6;}
  .section-tag{display:inline-block;font-size:9px;font-weight:700;background:#1a2f6e;color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;}
  .section-ta{width:100%;border:1.5px solid #e8e8e6;border-radius:8px;padding:8px 10px;font-size:13px;resize:vertical;background:#f8f8f6;color:#333;display:block;}
  .section-ta:focus{outline:none;border-color:#1a2f6e;}
  .divider{border-top:1px solid #f0f0ee;margin:10px 0 8px;}
  /* 배지 */
  .badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .badge-done{background:#ecfdf5;color:#059669;}
  .badge-plan{background:#eff6ff;color:#2563eb;}
  .badge-none{background:#f5f5f3;color:#aaa;}
  .ok-msg{color:#059669;font-size:13px;text-align:center;padding:10px;margin-top:6px;background:#ecfdf5;border-radius:8px;}
  .empty-box{color:#aaa;font-size:13px;text-align:center;padding:2rem;background:#fff;border-radius:14px;border:1px dashed #ddd;}
  /* 학생 카드 */
  .stu-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s;}
  .stu-card:hover{border-color:#aaa;}
  /* 탭 */
  .tab-wrap{display:flex;background:#e8e8e6;border-radius:10px;padding:3px;margin-bottom:16px;}
  .tab-btn{flex:1;padding:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:#888;border-radius:8px;}
  .tab-btn.active{background:#fff;color:#1a2f6e;font-weight:700;}
  /* 요일 */
  .day-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e8e8e6;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#888;}
  .day-btn.on{background:#1a2f6e;color:#fff;border-color:#1a2f6e;}
  .days-wrap{display:flex;gap:6px;margin-bottom:12px;}
  .rate-btn{padding:5px 16px;border-radius:20px;cursor:pointer;font-size:13px;border:1.5px solid #e8e8e6;background:#fff;color:#888;font-weight:500;}
  /* 홈 */
  .home-grid-3{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
  .home-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:16px 14px;cursor:pointer;transition:border-color .15s;}
  .home-card:hover{border-color:#aaa;}
  .home-card-icon{width:34px;height:34px;border-radius:9px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .home-card-full{background:#1a2f6e;border-radius:14px;padding:16px;cursor:pointer;grid-column:1/-1;display:flex;align-items:center;gap:14px;transition:background .15s;}
  .home-card-full:hover{background:#1e3a8a;}
  .home-card-full-icon{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .tog-btn{width:100%;padding:10px;border:1px dashed #ddd;border-radius:10px;background:transparent;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;}
  .date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .date-inp{border:1.5px solid #e8e8e6;border-radius:10px;padding:8px 12px;font-size:13px;background:#fff;color:#333;flex:1;}
  .hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .add-form{background:#f8f8f6;border-radius:12px;padding:1rem;margin-bottom:14px;border:1px solid #e8e8e6;}
  .sub-info{font-size:10px;color:#bbb;margin-top:3px;display:flex;align-items:center;gap:5px;}
  .rate-row{display:flex;gap:8px;margin-bottom:8px;}
  .p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .logout-btn{font-size:12px;color:rgba(255,255,255,0.6);background:transparent;border:none;cursor:pointer;padding:0;}
  .logout-btn:hover{color:#fff;}
  .logout-btn-dark{font-size:12px;color:#aaa;background:transparent;border:none;cursor:pointer;padding:0;}
  .chart-wrap{background:#fff;border-radius:14px;padding:1rem;margin-bottom:12px;border:1px solid #e8e8e6;}
  .chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .chart-bar-bg{flex:1;background:#f0f0ee;border-radius:4px;height:22px;overflow:hidden;}
  .chart-bar-fill{height:100%;border-radius:4px;}
  .modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:#fff;border-radius:16px;padding:1.5rem;width:90%;max-width:360px;}
  .modal-btns{display:flex;gap:8px;margin-top:14px;}
  .modal-btns button{flex:1;}
  .vid-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
  .vid-card:hover{border-color:#aaa;}
  .vid-thumb{width:100%;aspect-ratio:16/9;background:#111;border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .vid-player-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px;user-select:none;}
  .vid-player-wrap iframe{width:100%;height:100%;border:none;}
  .section-label{font-size:12px;font-weight:600;color:#1a2f6e;margin-bottom:5px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
(()=>{
const DAYS=['일','월','화','수','목','금','토'];
const localDate=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;};
const TODAY=localDate();
const fd=s=>{if(!s)return'';const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);return`${m}월 ${d}일 (${DAYS[dt.getDay()]}요일)`;};
const fdShort=s=>{if(!s)return'';const[y,m,d]=s.split('-').map(Number);return`${m}/${d}`;};
const dowOf=s=>{if(!s)return-1;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).getDay();};
const emL=()=>({plan:{check:'',core:'',fix:''},res:{check:{r:'',m:''},core:{r:'',m:''},fix:{r:'',m:''}},status:'none'});

const lsGet=k=>{try{return localStorage.getItem(k);}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,v);}catch{}};
const lsDel=k=>{try{localStorage.removeItem(k);}catch{}};
const PRE='kgj_v1_';

const MEM={stu:[],pw:'admin1234',lessons:{},videos:[]};
const rawStu=lsGet(PRE+'stu');if(rawStu)MEM.stu=JSON.parse(rawStu);
const rawPw=lsGet(PRE+'pw');if(rawPw)MEM.pw=rawPw;
const rawVid=lsGet(PRE+'videos');if(rawVid)MEM.videos=JSON.parse(rawVid);

const saveStu=()=>{MEM.stu=Q.students;lsSet(PRE+'stu',JSON.stringify(Q.students));};
const savePw=pw=>{MEM.pw=pw;Q.pw=pw;lsSet(PRE+'pw',pw);};
const saveVideos=()=>{MEM.videos=Q.videos;lsSet(PRE+'videos',JSON.stringify(Q.videos));};

const getLesson=(sid,date)=>{
  const k=`${sid}__${date}`;
  if(MEM.lessons[k])return JSON.parse(JSON.stringify(MEM.lessons[k]));
  const r=lsGet(PRE+'l_'+sid+'_'+date);
  if(r){const p=JSON.parse(r);MEM.lessons[k]=p;return JSON.parse(JSON.stringify(p));}
  return emL();
};
const setLesson=(sid,date,l)=>{
  const k=`${sid}__${date}`;
  const copy=JSON.parse(JSON.stringify(l));
  MEM.lessons[k]=copy;
  lsSet(PRE+'l_'+sid+'_'+date,JSON.stringify(copy));
  const rd=lsGet(PRE+'d_'+sid);
  const ds=rd?JSON.parse(rd):[];
  if(!ds.includes(date)){ds.unshift(date);ds.sort((a,b)=>b.localeCompare(a));}
  lsSet(PRE+'d_'+sid,JSON.stringify(ds.slice(0,60)));
};
const getDates=sid=>{
  const r=lsGet(PRE+'d_'+sid);
  const mem=Object.keys(MEM.lessons).filter(k=>k.startsWith(sid+'__')).map(k=>k.split('__')[1]);
  return[...new Set([...(r?JSON.parse(r):[]),...mem])].sort((a,b)=>b.localeCompare(a));
};
const deleteStu=sid=>{
  getDates(sid).forEach(d=>{lsDel(PRE+'l_'+sid+'_'+d);delete MEM.lessons[`${sid}__${d}`];});
  lsDel(PRE+'d_'+sid);
};

let Q={scr:'home',students:MEM.stu,pw:MEM.pw,videos:MEM.videos,
  aDate:TODAY,aStu:null,aLesson:null,aTab:'plan',editStu:null,
  pStu:null,pDate:TODAY,pLesson:null,pDates:[],pTab:'plan',
  vStu:null,vVideo:null,
  err:'',showAdd:false,showAllStu:false,showVidAdd:false};

const A=document.getElementById('app');
const gid=id=>document.getElementById(id);
const RC={상:'#16a34a',중:'#d97706',하:'#dc2626'};
const SL={none:'미입력',planned:'계획 입력됨',completed:'완성도 기록됨'};
const SC={none:'#9ca3af',planned:'#2563eb',completed:'#16a34a'};
const LK=['check','core','fix'];
const LABELS=['CHECK — 확인 및 복습','CORE — 핵심 내용','FIX — 교정 및 정착'];
const RV={상:3,중:2,하:1};

// 유튜브 URL → ID 추출
const ytId=url=>{
  if(!url)return'';
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?m[1]:'';
};

const mk=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;};
const mks=(tag,css,html)=>{const e=document.createElement(tag);if(css)e.style.cssText=css;if(html!==undefined)e.innerHTML=html;return e;};

function dayTags(days){
  if(!days||!days.length)return mks('span','font-size:11px;color:#aaa;','요일 미설정');
  const w=mks('span','');
  [...days].sort((a,b)=>a-b).forEach((d,i)=>{
    if(i)w.appendChild(mks('span','font-size:11px;color:#ccc;','·'));
    w.appendChild(mks('span','font-size:11px;font-weight:500;color:#888;',DAYS[d]+'요일'));
  });
  return w;
}

function dayPicker(selected,onChange){
  const w=mk('div','days-wrap');
  [1,2,3,4,5,6,0].forEach(d=>{
    const b=mk('button','day-btn'+(selected.includes(d)?' on':''),DAYS[d]);
    b.onclick=()=>{const ns=selected.includes(d)?selected.filter(x=>x!==d):[...selected,d];onChange(ns);};
    w.appendChild(b);
  });
  return w;
}

function sectionBlock(label,L,key,roplan,showRes){
  const w=mk('div','section-block');
  const tag=mk('div','section-tag',label.split('—')[0].trim());
  w.appendChild(tag);
  w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:8px;',label.split('—')[1]?.trim()||''));
  if(!roplan){
    const ta=document.createElement('textarea');
    ta.className='section-ta';ta.rows=3;ta.value=L.plan[key];
    ta.placeholder='내용을 입력하세요...';
    ta.oninput=()=>{L.plan[key]=ta.value;};w.appendChild(ta);
  } else {
    w.appendChild(mks('div','font-size:13px;color:#333;line-height:1.6;white-space:pre-wrap;min-height:16px;',L.plan[key]||'<span style="color:#ccc">—</span>'));
  }
  if(showRes){
    w.appendChild(mk('div','divider'));
    w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:6px;','완성도'));
    const bd=mk('div','rate-row');
    const btns=[];
    const upd=sel=>btns.forEach((b,i)=>{const r=['상','중','하'][i];const s=r===sel;b.style.background=s?RC[r]:'#fff';b.style.color=s?'#fff':'#888';b.style.borderColor=s?RC[r]:'#e8e8e6';});
    ['상','중','하'].forEach(r=>{
      const sel=L.res[key].r===r;
      const b=mk('button','rate-btn',r);
      if(sel){b.style.background=RC[r];b.style.color='#fff';b.style.borderColor=RC[r];}
      b.onclick=()=>{L.res[key].r=r;upd(r);};btns.push(b);bd.appendChild(b);
    });
    w.appendChild(bd);
    const mi=document.createElement('input');mi.className='inp';
    mi.placeholder='피드백 메모 (선택사항)';mi.value=L.res[key].m||'';
    mi.style.marginBottom='0';mi.oninput=()=>L.res[key].m=mi.value;w.appendChild(mi);
  }
  return w;
}

function sectionBlockRO(label,plan,res,showRes){
  const w=mk('div','section-block');
  const tag=mk('div','section-tag',label.split('—')[0].trim());
  w.appendChild(tag);
  w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:8px;',label.split('—')[1]?.trim()||''));
  w.appendChild(mks('div','font-size:13px;color:#333;line-height:1.6;white-space:pre-wrap;min-height:16px;',plan||'<span style="color:#ccc">—</span>'));
  if(showRes&&res){
    w.appendChild(mk('div','divider'));
    if(res.r){
      const row=mks('div','display:flex;align-items:center;gap:8px;');
      row.appendChild(mks('span',`display:inline-block;font-size:12px;font-weight:700;color:#fff;background:${RC[res.r]};padding:3px 14px;border-radius:20px;`,res.r));
      if(res.m)row.appendChild(mks('span','font-size:12px;color:#888;',res.m));
      w.appendChild(row);
    } else {
      w.appendChild(mks('div','font-size:12px;color:#ccc;','완성도 미입력'));
    }
  }
  return w;
}

function showModal(title,msg,onOk){
  const bg=mk('div','modal-bg');
  const box=mk('div','modal');
  box.appendChild(mks('div','font-size:15px;font-weight:500;color:#111;margin-bottom:8px;',title));
  box.appendChild(mks('div','font-size:13px;color:#555;',msg));
  const btns=mk('div','modal-btns');
  const cancel=mk('button','btn-ghost','취소');cancel.onclick=()=>bg.remove();
  const ok=mk('button','btn-danger','삭제');ok.onclick=()=>{bg.remove();onOk();};
  btns.appendChild(cancel);btns.appendChild(ok);box.appendChild(btns);
  bg.appendChild(box);document.body.appendChild(bg);
}

function render(){A.innerHTML='';({home,aLogin,aList,aLessonView,aStuEdit,aSettings,pLogin,pView,pChart,vLogin,vList,vPlay})[Q.scr]();}

function home(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mks('div','background:#1a2f6e;padding:28px 20px 24px;border-radius:20px;margin:12px 12px 0;');
  hdr.appendChild(mks('div','font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:.1em;margin-bottom:6px;','KIM GIJUN ENGLISH ACADEMY'));
  hdr.appendChild(mks('div','font-size:22px;font-weight:700;color:#fff;margin-bottom:3px;','김기준영어학원'));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);','수업 관리 시스템'));
  w.appendChild(hdr);

  const svgNS='http://www.w3.org/2000/svg';
  const mkIcon=(paths,vb)=>{
    const s=document.createElementNS(svgNS,'svg');
    s.setAttribute('viewBox',vb||'0 0 24 24');s.setAttribute('width','22');s.setAttribute('height','22');
    s.setAttribute('fill','none');s.setAttribute('stroke','#1a2f6e');
    s.setAttribute('stroke-width','1.8');s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
    s.style.cssText='display:block;';
    paths.forEach(d=>{const p=document.createElementNS(svgNS,'path');p.setAttribute('d',d);s.appendChild(p);});
    return s;
  };

  const g=mk('div','home-grid-3');w.appendChild(g);

  const c1card=mk('div','home-card');
  const ic1=mks('div','width:36px;height:36px;background:#eef2ff;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;');
  ic1.appendChild(mkIcon(['M7 11V7a5 5 0 0 1 10 0v4','M5 11h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2z','M12 16a1 1 0 1 0 0-2 1 1 0 0 0 0 2z']));
  c1card.appendChild(ic1);
  c1card.appendChild(mks('div','font-size:13px;font-weight:700;color:#111;margin-bottom:2px;','원장 로그인'));
  c1card.appendChild(mks('div','font-size:10px;color:#aaa;','수업 계획 · 완성도 입력'));
  c1card.onclick=()=>{Q.scr='aLogin';render();};g.appendChild(c1card);

  const c2card=mk('div','home-card');
  const ic2=mks('div','width:36px;height:36px;background:#f0fdf4;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;');
  ic2.appendChild(mkIcon(['M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2','M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z']));
  c2card.appendChild(ic2);
  c2card.appendChild(mks('div','font-size:13px;font-weight:700;color:#111;margin-bottom:2px;','학부모 조회'));
  c2card.appendChild(mks('div','font-size:10px;color:#aaa;','수업 내용 · 결과 확인'));
  c2card.onclick=()=>{Q.scr='pLogin';render();};g.appendChild(c2card);

  const vccard=mk('div','home-card-full');
  const vicRow=mks('div','display:flex;align-items:center;gap:14px;');
  const ic3=mks('div','width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;');

  // 영상 배정
  if(Q.videos.length){
    w.appendChild(mks('div','margin-top:4px;border-top:1px solid #eee;padding-top:14px;margin-bottom:8px;'));
    w.appendChild(mks('div','font-size:13px;font-weight:500;color:#111;margin-bottom:10px;','시청 가능 영상 설정'));
    const assignedVids=stu.videos||[];
    Q.videos.forEach(v=>{
      const row=mks('div','display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f9f9f7;border-radius:8px;margin-bottom:6px;cursor:pointer;');
      const cb=document.createElement('input');cb.type='checkbox';cb.style.cssText='width:16px;height:16px;cursor:pointer;flex-shrink:0;';
      cb.checked=assignedVids.includes(v.id);
      cb.onchange=()=>{
        if(cb.checked){if(!stu.videos)stu.videos=[];if(!stu.videos.includes(v.id))stu.videos.push(v.id);}
        else{stu.videos=(stu.videos||[]).filter(id=>id!==v.id);}
      };
      const label=mks('div','flex:1;');
      label.appendChild(mks('div','font-size:13px;color:#111;',v.title));
      if(v.desc)label.appendChild(mks('div','font-size:11px;color:#aaa;margin-top:2px;',v.desc));
      row.appendChild(cb);row.appendChild(label);
      row.onclick=e=>{if(e.target!==cb){cb.checked=!cb.checked;cb.onchange();}};
      w.appendChild(row);
    });
  } else {
    w.appendChild(mks('div','font-size:12px;color:#aaa;margin-top:8px;','※ 영상을 먼저 설정에서 등록해주세요.'));
  }

  if(Q.err)w.appendChild(mk('div','err',Q.err));
  const msg=mks('div','');w.appendChild(msg);
  const saveBtn=mk('button','btn-primary','저장');
  saveBtn.onclick=()=>{
    const n=ni.value.trim(),c2=ci.value.trim();
    if(!n||!c2){Q.err='이름과 코드를 입력하세요.';render();return;}
    if(Q.students.find(s=>s.name===n&&s.id!==stu.id)){Q.err='같은 이름의 학생이 이미 있습니다.';render();return;}
    const idx=Q.students.findIndex(s=>s.id===stu.id);
    if(idx>=0)Q.students[idx]={...Q.students[idx],name:n,code:c2,days:stu.days,videos:stu.videos||[]};
    saveStu();
    msg.innerHTML='<div class="ok-msg">✓ 저장되었습니다!</div>';
    setTimeout(()=>{Q.scr='aList';render();},700);
  };w.appendChild(saveBtn);

  w.appendChild(mks('div','margin-top:24px;border-top:1px solid #eee;padding-top:16px;'));
  w.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:8px;','위험 구역'));
  const delBtn=mk('button','btn-danger','이 학생 삭제');
  delBtn.onclick=()=>{
    const name=Q.students.find(s=>s.id===stu.id)?.name||'';
    showModal('학생 삭제',`${name} 학생과 모든 수업 기록이 삭제됩니다. 복구할 수 없습니다.`,()=>{
      deleteStu(stu.id);
      Q.students=Q.students.filter(s=>s.id!==stu.id);
      saveStu();Q.scr='aList';render();
    });
  };w.appendChild(delBtn);
}

  const ni=document.createElement('input');ni.id='pn';ni.className='inp';ni.placeholder='홍길동';c.appendChild(ni);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','코드'));
  const ci=document.createElement('input');ci.id='pc';ci.className='inp';ci.placeholder='1234';c.appendChild(ci);
  if(Q.err)c.appendChild(mk('div','err',Q.err));
  const doP=()=>{
    const n=(gid('pn')?.value||'').trim(),code=(gid('pc')?.value||'').trim();
    const stu=Q.students.find(s=>s.name===n&&s.code===code);
    if(!stu){Q.err='이름 또는 코드가 맞지 않습니다.';render();return;}
    Q.pStu=stu;Q.pDate=TODAY;Q.pLesson=getLesson(stu.id,TODAY);Q.pDates=getDates(stu.id);Q.err='';Q.scr='pView';render();
  };
  ci.onkeydown=e=>{if(e.key==='Enter')doP();};
  const btn=mk('button','btn-primary','조회하기');btn.onclick=doP;c.appendChild(btn);
}

function pView(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='home';render();};hdr.appendChild(bb);
  const ph=mks('div','display:flex;justify-content:space-between;align-items:center;');
  ph.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;',Q.pStu.name));
  const right=mks('div','display:flex;align-items:center;gap:10px;');
  const chartBtn=mk('button','btn-ghost-inv','📊 그래프');
  chartBtn.onclick=()=>{Q.scr='pChart';render();};right.appendChild(chartBtn);
  const lo=mk('button','logout-btn','로그아웃');
  lo.onclick=()=>{Q.pStu=null;Q.pDate=TODAY;Q.pLesson=null;Q.pDates=[];Q.scr='pLogin';render();};
  right.appendChild(lo);ph.appendChild(right);hdr.appendChild(ph);
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);

  const allDates=[...new Set([TODAY,...(Q.pDates||[])])].sort((a,b)=>b.localeCompare(a)).slice(0,20);
  if(allDates.length){
    const ds=document.createElement('select');ds.className='inp';
    allDates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=fd(d)+(d===TODAY?' (오늘)':'');if(d===Q.pDate)o.selected=true;ds.appendChild(o);});
    ds.onchange=()=>{Q.pDate=ds.value;Q.pLesson=getLesson(Q.pStu.id,Q.pDate);Q.pTab='plan';render();};
    body.appendChild(ds);
  }
  const L=Q.pLesson;
  if(L.status==='none'){body.appendChild(mk('div','empty-box','아직 오늘의 수업 계획이 없습니다.'));return;}
  if(!Q.pTab)Q.pTab='plan';
  if(L.status==='completed'){
    const tabs=mk('div','tab-wrap');body.appendChild(tabs);
    ['plan','result'].forEach(t=>{
      const tb=mk('button','tab-btn'+(Q.pTab===t?' active':''),t==='plan'?'오늘 배울 내용':'수업 결과');
      tb.onclick=()=>{Q.pTab=t;render();};tabs.appendChild(tb);
    });
  } else {
    body.appendChild(mks('div','font-size:12px;font-weight:700;color:#1a2f6e;margin-bottom:12px;padding:10px 14px;background:#eef2ff;border-radius:10px;','📚 오늘 배울 내용'));
  }
  if(Q.pTab==='plan'||L.status==='planned'){
    LK.forEach((k,i)=>body.appendChild(sectionBlockRO(LABELS[i],L.plan[k],null,false)));
  } else {
    body.appendChild(mks('div','font-size:12px;font-weight:700;color:#059669;margin-bottom:12px;padding:10px 14px;background:#ecfdf5;border-radius:10px;','✅ 수업 결과'));
    LK.forEach((k,i)=>body.appendChild(sectionBlockRO(LABELS[i],L.plan[k],L.res[k],true)));
  }
}

function pChart(){
  const w=mks('div','padding:1rem;');A.appendChild(w);
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='pView';render();};w.appendChild(bb);
  w.appendChild(mks('div','font-size:16px;font-weight:500;color:#111;margin-bottom:4px;',Q.pStu.name+' 수업 현황'));
  w.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:16px;','완성도가 기록된 최근 수업 기준'));

  const dates=getDates(Q.pStu.id).filter(d=>getLesson(Q.pStu.id,d).status==='completed').slice(0,10).reverse();

  if(!dates.length){w.appendChild(mk('div','empty-box','아직 완성도 기록이 없습니다.'));return;}

  // 날짜별 막대 그래프
  const cw=mk('div','chart-wrap');w.appendChild(cw);
  cw.appendChild(mks('div','font-size:12px;font-weight:500;color:#555;margin-bottom:12px;','날짜별 평균 완성도'));
  dates.forEach(d=>{
    const l=getLesson(Q.pStu.id,d);
    const scores=LK.map(k=>RV[l.res[k].r]||0).filter(v=>v>0);
    if(!scores.length)return;
    const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
    const pct=Math.round((avg/3)*100);
    const color=avg>=2.5?RC['상']:avg>=1.5?RC['중']:RC['하'];
    const label=avg>=2.5?'상':avg>=1.5?'중':'하';
    const row=mk('div','chart-bar-row');
    row.appendChild(mks('div','font-size:11px;color:#888;width:44px;flex-shrink:0;text-align:right;',fdShort(d)));
    const bg=mk('div','chart-bar-bg');
    const fill=mk('div','chart-bar-fill');fill.style.background=color;fill.style.width=pct+'%';
    bg.appendChild(fill);row.appendChild(bg);
    row.appendChild(mks('div','font-size:12px;font-weight:500;margin-left:6px;min-width:20px;',`<span style="color:${color}">${label}</span>`));
    cw.appendChild(row);
  });

  // 항목별 평균
  const cw2=mk('div','chart-wrap');w.appendChild(cw2);
  cw2.appendChild(mks('div','font-size:12px;font-weight:500;color:#555;margin-bottom:12px;','항목별 평균 완성도'));
  LK.forEach((k,i)=>{
    const scores=dates.map(d=>{const l=getLesson(Q.pStu.id,d);return RV[l.res[k].r]||0;}).filter(v=>v>0);
    if(!scores.length)return;
    const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
    const pct=Math.round((avg/3)*100);
    const color=avg>=2.5?RC['상']:avg>=1.5?RC['중']:RC['하'];
    const label=avg>=2.5?'상':avg>=1.5?'중':'하';
    const row=mk('div','chart-bar-row');
    row.appendChild(mks('div','font-size:11px;color:#888;width:44px;flex-shrink:0;text-align:right;',['CHECK','CORE','FIX'][i]));
    const bg=mk('div','chart-bar-bg');
    const fill=mk('div','chart-bar-fill');fill.style.background=color;fill.style.width=pct+'%';
    bg.appendChild(fill);row.appendChild(bg);
    row.appendChild(mks('div','font-size:12px;font-weight:500;margin-left:6px;min-width:20px;',`<span style="color:${color}">${label}</span>`));
    cw2.appendChild(row);
  });
}

// 영상 — 학생 로그인
function vLogin(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='home';Q.err='';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;','수업 영상'));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;','강의 영상 시청'));
  w.appendChild(hdr);
  if(Q.vStu){Q.scr='vList';render();return;}
  const body=mk('div','page-body');w.appendChild(body);
  const c=mk('div','card');body.appendChild(c);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:16px;','이름과 코드를 입력하면 영상을 시청할 수 있어요.'));
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','이름'));
  const ni=document.createElement('input');ni.id='vln';ni.className='inp';ni.placeholder='홍길동';c.appendChild(ni);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','코드'));
  const ci=document.createElement('input');ci.id='vlc';ci.className='inp';ci.placeholder='1234';c.appendChild(ci);
  if(Q.err)c.appendChild(mk('div','err',Q.err));
  const doV=()=>{
    const n=(document.getElementById('vln')?.value||'').trim();
    const code=(document.getElementById('vlc')?.value||'').trim();
    const stu=Q.students.find(s=>s.name===n&&s.code===code);
    if(!stu){Q.err='이름 또는 코드가 맞지 않습니다.';render();return;}
    Q.vStu=stu;Q.err='';Q.scr='vList';render();
  };
  ci.onkeydown=e=>{if(e.key==='Enter')doV();};
  const btn=mk('button','btn-primary','입장하기');btn.onclick=doV;c.appendChild(btn);
}

// 영상 목록
function vList(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='home';render();};hdr.appendChild(bb);
  const ph=mks('div','display:flex;justify-content:space-between;align-items:center;');
  ph.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;','수업 영상'));
  const lo=mk('button','logout-btn','로그아웃');
  lo.onclick=()=>{Q.vStu=null;Q.scr='vLogin';render();};ph.appendChild(lo);
  hdr.appendChild(ph);w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  const assignedIds=Q.vStu.videos||[];
  const myVideos=Q.videos.filter(v=>assignedIds.includes(v.id));
  if(!myVideos.length){body.appendChild(mk('div','empty-box','배정된 영상이 없습니다.\n원장님께 문의해주세요.'));return;}
  myVideos.forEach(v=>{
    const card=mk('div','vid-card');
    const thumb=mk('div','vid-thumb');
    const img=document.createElement('img');
    img.src=`https://img.youtube.com/vi/${v.ytId}/mqdefault.jpg`;
    img.style.cssText='width:100%;height:100%;object-fit:cover;';
    img.onerror=()=>{thumb.style.background='#e8e8e6';thumb.innerHTML='<div style="color:#aaa;font-size:24px;text-align:center;padding-top:30px;">▶</div>';};
    thumb.appendChild(img);card.appendChild(thumb);
    card.appendChild(mks('div','font-size:14px;font-weight:600;color:#111;margin-bottom:4px;',v.title));
    if(v.desc)card.appendChild(mks('div','font-size:12px;color:#888;',v.desc));
    card.onclick=()=>{Q.vVideo=v;Q.scr='vPlay';render();};
    body.appendChild(card);
  });
}

// 영상 재생
function vPlay(){
  const v=Q.vVideo;
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 목록으로');bb.onclick=()=>{Q.scr='vList';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:16px;font-weight:700;color:#fff;',v.title));
  if(v.desc)hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;',v.desc));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  const wrap=mk('div','vid-player-wrap');
  wrap.style.position='relative';
  wrap.oncontextmenu=e=>e.preventDefault();
  const iframe=document.createElement('iframe');
  iframe.src=`https://www.youtube-nocookie.com/embed/${v.ytId}?rel=0&modestbranding=1`;
  iframe.setAttribute('referrerpolicy','strict-origin-when-cross-origin');
  iframe.allow='accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture';
  iframe.allowFullscreen=true;
  wrap.appendChild(iframe);
  body.appendChild(wrap);
  body.appendChild(mks('div','font-size:11px;color:#ccc;text-align:center;margin-top:8px;','© 김기준영어학원 — 무단 배포 금지'));
}

render();
})();
