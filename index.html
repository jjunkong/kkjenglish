<!DOCTYPE html>
<html lang="ko">
<head>

<style>
@font-face{font-family:'GmarketSans';src:url('https://raw.githubusercontent.com/jjunkong/kkjenglish/main/GmarketSansTTFBold.ttf') format('truetype');font-weight:700;}

<title>김기준영어학원 수업 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'NanumGothic','Nanum Gothic',-apple-system,sans-serif;background:#f0f0ee;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:0;}
#app{width:100%;max-width:480px;min-height:100vh;background:#f0f0ee;padding-top:40px;}
.gm{font-family:'GmarketSans','NanumGothic',sans-serif;font-weight:700;}
input,select,textarea,button{font-family:'NanumGothic','Nanum Gothic',-apple-system,sans-serif;}
.page-header{background:#1a2f6e;padding:20px 20px 24px;position:relative;border-radius:20px;margin:12px 12px 0;}
.page-header-sub{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:.08em;margin-bottom:4px;}
.page-header-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px;}
.page-header-desc{font-size:11px;color:rgba(255,255,255,0.5);}
.page-header-back{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;padding:0 0 12px;display:block;}
.page-header-row{display:flex;justify-content:space-between;align-items:flex-end;}
.page-body{padding:16px;}
.card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:1rem 1.25rem;margin-bottom:12px;}
.btn-primary{background:#1a2f6e;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
.btn-primary:hover{background:#1e3a8a;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.btn-green{background:#16a34a;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
.btn-green:hover{background:#15803d;}
.btn-danger{background:#dc2626;color:#fff;border:none;border-radius:10px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:6px;}
.btn-danger:hover{background:#b91c1c;}
.btn-back{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;padding:0 0 12px;display:block;}
.btn-back-dark{background:transparent;border:none;color:#888;font-size:12px;cursor:pointer;padding:0 0 14px;display:block;}
.btn-ghost{background:transparent;border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#444;}
.btn-ghost:hover{background:#f0f0ee;}
.btn-ghost-inv{background:rgba(255,255,255,0.15);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#fff;}
.btn-ghost-inv:hover{background:rgba(255,255,255,0.25);}
.btn-sm{background:#f5f5f3;border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:#666;}
.btn-sm:hover{background:#e8e8e6;}
.inp{width:100%;border:1.5px solid #e8e8e6;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;color:#111;margin-bottom:10px;display:block;}
.inp:focus{outline:none;border-color:#1a2f6e;}
.err{color:#dc2626;font-size:12px;margin-bottom:8px;padding:8px 10px;background:#fef2f2;border-radius:8px;}
.section-block{margin-bottom:10px;background:#fff;border-radius:12px;padding:14px;border:1px solid #e8e8e6;}
.section-tag{display:inline-block;font-size:9px;font-weight:700;background:#1a2f6e;color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;}
.section-tag-green{display:inline-block;font-size:9px;font-weight:700;background:#16a34a;color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;}
.section-ta{width:100%;border:1.5px solid #e8e8e6;border-radius:8px;padding:8px 10px;font-size:13px;resize:vertical;background:#f8f8f6;color:#333;display:block;}
.section-ta:focus{outline:none;border-color:#1a2f6e;}
.divider{border-top:1px solid #f0f0ee;margin:10px 0 8px;}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-done{background:#ecfdf5;color:#059669;}
.badge-plan{background:#eff6ff;color:#2563eb;}
.badge-none{background:#f5f5f3;color:#aaa;}
.ok-msg{color:#059669;font-size:13px;text-align:center;padding:10px;margin-top:6px;background:#ecfdf5;border-radius:8px;}
.empty-box{color:#aaa;font-size:13px;text-align:center;padding:2rem;background:#fff;border-radius:14px;border:1px dashed #ddd;}
.stu-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px 16px;margin-bottom:8px;transition:border-color .15s;}
.stu-card:hover{border-color:#aaa;}
.tab-wrap{display:flex;background:#e8e8e6;border-radius:10px;padding:3px;margin-bottom:16px;}
.tab-btn{flex:1;padding:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:transparent;color:#888;border-radius:8px;}
.tab-btn.active{background:#fff;color:#1a2f6e;font-weight:700;}
.day-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e8e8e6;cursor:pointer;font-size:13px;font-weight:600;background:#fff;color:#888;}
.day-btn.on{background:#1a2f6e;color:#fff;border-color:#1a2f6e;}
.days-wrap{display:flex;gap:6px;margin-bottom:12px;}
.rate-btn{padding:5px 16px;border-radius:20px;cursor:pointer;font-size:13px;border:1.5px solid #e8e8e6;background:#fff;color:#888;font-weight:500;}
.home-grid-3{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.home-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:16px 14px;cursor:pointer;transition:border-color .15s;}
.home-card:hover{border-color:#aaa;}
.home-card-icon{width:34px;height:34px;border-radius:9px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.home-card-full{background:#1a2f6e;border-radius:14px;padding:16px;cursor:pointer;grid-column:1/-1;display:flex;align-items:center;gap:14px;transition:background .15s;}
.home-card-full:hover{background:#1e3a8a;}
.home-card-full-green{background:#16a34a;border-radius:14px;padding:16px;cursor:pointer;grid-column:1/-1;display:flex;align-items:center;gap:14px;transition:background .15s;}
.home-card-full-green:hover{background:#15803d;}
.tog-btn{width:100%;padding:10px;border:1px dashed #ddd;border-radius:10px;background:transparent;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.date-inp{border:1.5px solid #e8e8e6;border-radius:10px;padding:8px 12px;font-size:13px;background:#fff;color:#333;flex:1;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.add-form{background:#f8f8f6;border-radius:12px;padding:1rem;margin-bottom:14px;border:1px solid #e8e8e6;}
.sub-info{font-size:10px;color:#bbb;margin-top:3px;display:flex;align-items:center;gap:5px;}
.rate-row{display:flex;gap:8px;margin-bottom:8px;}
.p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.logout-btn{font-size:12px;color:rgba(255,255,255,0.6);background:transparent;border:none;cursor:pointer;padding:0;}
.logout-btn:hover{color:#fff;}
.logout-btn-dark{font-size:12px;color:#aaa;background:transparent;border:none;cursor:pointer;padding:0;}
.chart-wrap{background:#fff;border-radius:14px;padding:1rem;margin-bottom:12px;border:1px solid #e8e8e6;}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.chart-bar-bg{flex:1;background:#f0f0ee;border-radius:4px;height:22px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:90%;max-width:360px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.modal-btns button{flex:1;}
.vid-card{background:#fff;border:1px solid #e8e8e6;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
.vid-card:hover{border-color:#aaa;}
.vid-thumb{width:100%;aspect-ratio:16/9;background:#111;border-radius:10px;margin-bottom:10px;overflow:hidden;}
.vid-player-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px;user-select:none;}
.vid-player-wrap iframe{width:100%;height:100%;border:none;}
.section-label{font-size:12px;font-weight:600;color:#1a2f6e;margin-bottom:5px;}
/* 출결 버튼 */
.att-btn{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid #e8e8e6;background:#fff;color:#888;font-family:inherit;}
.att-present.active{background:#16a34a;color:#fff;border-color:#16a34a;}
.att-late.active{background:#d97706;color:#fff;border-color:#d97706;}
.att-absent.active{background:#dc2626;color:#fff;border-color:#dc2626;}
.hw-done.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.hw-notdone.active{background:#dc2626;color:#fff;border-color:#dc2626;}
/* 학습리더 헤더 */
.page-header-leader{background:#1a5c36;padding:20px 20px 24px;position:relative;border-radius:20px;margin:12px 12px 0;}
</style>
</head>
<body>
<div id="app"></div>
<script>
(()=>{
const DAYS=['일','월','화','수','목','금','토'];
const localDate=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;};
const TODAY=localDate();
const fd=s=>{if(!s)return'';const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);return`${m}월 ${d}일 (${DAYS[dt.getDay()]}요일)`;};
const fdShort=s=>{if(!s)return'';const[y,m,d]=s.split('-').map(Number);return`${m}/${d}`;};
const dowOf=s=>{if(!s)return-1;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).getDay();};
const emL=()=>({plan:{check:'',core:'',fix:''},res:{check:{r:'',m:''},core:{r:'',m:''},fix:{r:'',m:''}},vocab:{score:'',comment:''},status:'none'});

const FB='https://kkjenglish-a831d-default-rtdb.firebaseio.com';
const fbGet=async path=>{try{const r=await fetch(`${FB}/${path}.json`);if(!r.ok)return null;const d=await r.json();return d;}catch{return null;}};
const fbSet=async(path,val)=>{try{await fetch(`${FB}/${path}.json`,{method:'PUT',body:JSON.stringify(val)});return true;}catch{return false;}};
const fbDel=async path=>{try{await fetch(`${FB}/${path}.json`,{method:'DELETE'});return true;}catch{return false;}};

const MEM={stu:[],pw:'admin1234',lessons:{},videos:[],notices:[],classes:[],leaders:[]};

const initData=async()=>{
  const stu=await fbGet('students');if(stu)MEM.stu=Object.values(stu);
  const pw=await fbGet('pw');if(pw)MEM.pw=pw;
  const vids=await fbGet('videos');if(vids)MEM.videos=Array.isArray(vids)?vids:Object.values(vids);
  const nots=await fbGet('notices');if(nots)MEM.notices=Array.isArray(nots)?nots:Object.values(nots);
  const cls=await fbGet('classes');if(cls)MEM.classes=Array.isArray(cls)?cls:Object.values(cls);
  const ldrs=await fbGet('leaders');if(ldrs)MEM.leaders=Array.isArray(ldrs)?ldrs:Object.values(ldrs);
};

const saveStu=async()=>{MEM.stu=Q.students;const obj={};Q.students.forEach(s=>{obj[s.id]=s;});await fbSet('students',obj);};
const savePw=async pw=>{MEM.pw=pw;Q.pw=pw;await fbSet('pw',pw);};
const saveVideos=async()=>{MEM.videos=Q.videos;await fbSet('videos',Q.videos);};
const saveNotices=async()=>{MEM.notices=Q.notices;await fbSet('notices',Q.notices);};
const saveClasses=async()=>{MEM.classes=Q.classes;await fbSet('classes',Q.classes);};
const saveLeaders=async()=>{MEM.leaders=Q.leaders;const obj={};Q.leaders.forEach(l=>{obj[l.id]=l;});await fbSet('leaders',obj);};

const getLesson=async(sid,date)=>{
  const k=`${sid}__${date}`;
  if(MEM.lessons[k])return JSON.parse(JSON.stringify(MEM.lessons[k]));
  const r=await fbGet(`lessons/${sid}/${date.replace(/-/g,'_')}`);
  if(r){MEM.lessons[k]=r;return JSON.parse(JSON.stringify(r));}
  return emL();
};
const setLesson=async(sid,date,l)=>{
  const k=`${sid}__${date}`;
  const copy=JSON.parse(JSON.stringify(l));
  MEM.lessons[k]=copy;
  await fbSet(`lessons/${sid}/${date.replace(/-/g,'_')}`,copy);
  const rd=MEM.dates?.[sid]||[];
  if(!rd.includes(date)){rd.unshift(date);rd.sort((a,b)=>b.localeCompare(a));}
  if(!MEM.dates)MEM.dates={};
  MEM.dates[sid]=rd.slice(0,60);
  await fbSet(`dates/${sid}`,MEM.dates[sid]);
};
const getDates=sid=>{
  if(MEM.dates?.[sid])return MEM.dates[sid];
  return [];
};
const getDatesAsync=async sid=>{
  if(MEM.dates?.[sid])return MEM.dates[sid];
  const r=await fbGet(`dates/${sid}`);
  if(!MEM.dates)MEM.dates={};
  MEM.dates[sid]=r||[];
  return MEM.dates[sid];
};
const deleteStu=async sid=>{
  const dates=await getDatesAsync(sid);
  for(const d of dates){await fbDel(`lessons/${sid}/${d.replace(/-/g,'_')}`);delete MEM.lessons[`${sid}__${d}`];}
  await fbDel(`dates/${sid}`);
  if(MEM.dates)delete MEM.dates[sid];
};

let Q={scr:'home',students:MEM.stu,pw:MEM.pw,videos:MEM.videos,notices:MEM.notices,classes:MEM.classes,leaders:MEM.leaders,
  aDate:TODAY,aStu:null,aLesson:null,aTab:'plan',editStu:null,
  pStu:null,pDate:TODAY,pLesson:null,pDates:[],pTab:'plan',
  vStu:null,vVideo:null,
  lLeader:null,lStu:null,lLesson:null,lDate:TODAY,
  err:'',showAdd:false,showAllStu:false,showVidAdd:false,showNoticeAdd:false,loading:true};

const A=document.getElementById('app');
const gid=id=>document.getElementById(id);
const RC={상:'#16a34a',중:'#d97706',하:'#dc2626'};
const SL={none:'미입력',planned:'계획 입력됨',completed:'완성도 기록됨'};
const SC={none:'#9ca3af',planned:'#2563eb',completed:'#16a34a'};
const LK=['check','core','fix'];
const LABELS=['CHECK — 확인 및 복습','CORE — 핵심 내용','FIX — 교정 및 정착'];
const RV={상:3,중:2,하:1};

const ytId=url=>{if(!url)return'';const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);return m?m[1]:'';};
const mk=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;};
const mks=(tag,css,html)=>{const e=document.createElement(tag);if(css)e.style.cssText=css;if(html!==undefined)e.innerHTML=html;return e;};

function dayTags(days){
  if(!days||!days.length)return mks('span','font-size:11px;color:#aaa;','요일 미설정');
  const w=mks('span','');
  [...days].sort((a,b)=>a-b).forEach((d,i)=>{
    if(i)w.appendChild(mks('span','font-size:11px;color:#ccc;','·'));
    w.appendChild(mks('span','font-size:11px;font-weight:500;color:#888;',DAYS[d]+'요일'));
  });
  return w;
}

function dayPicker(selected,onChange){
  const w=mk('div','days-wrap');
  [1,2,3,4,5,6,0].forEach(d=>{
    const b=mk('button','day-btn'+(selected.includes(d)?' on':''),DAYS[d]);
    b.onclick=()=>{const ns=selected.includes(d)?selected.filter(x=>x!==d):[...selected,d];onChange(ns);};
    w.appendChild(b);
  });
  return w;
}

function sectionBlock(label,L,key,roplan,showRes){
  const w=mk('div','section-block');
  const tag=mk('div','section-tag',label.split('—')[0].trim());
  w.appendChild(tag);
  w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:8px;',label.split('—')[1]?.trim()||''));
  if(!roplan){
    const ta=document.createElement('textarea');
    ta.className='section-ta';ta.rows=3;ta.value=L.plan[key];
    ta.placeholder='내용을 입력하세요...';
    ta.oninput=()=>{L.plan[key]=ta.value;};w.appendChild(ta);
  }else{
    w.appendChild(mks('div','font-size:13px;color:#333;line-height:1.6;white-space:pre-wrap;min-height:16px;',L.plan[key]||'<span style="color:#ccc">—</span>'));
  }
  if(showRes){
    w.appendChild(mk('div','divider'));
    w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:6px;','완성도'));
    const bd=mk('div','rate-row');
    const btns=[];
    const upd=sel=>btns.forEach((b,i)=>{const r=['상','중','하'][i];const s=r===sel;b.style.background=s?RC[r]:'#fff';b.style.color=s?'#fff':'#888';b.style.borderColor=s?RC[r]:'#e8e8e6';});
    ['상','중','하'].forEach(r=>{
      const sel=L.res[key].r===r;
      const b=mk('button','rate-btn',r);
      if(sel){b.style.background=RC[r];b.style.color='#fff';b.style.borderColor=RC[r];}
      b.onclick=()=>{L.res[key].r=r;upd(r);};btns.push(b);bd.appendChild(b);
    });
    w.appendChild(bd);
    const mi=document.createElement('input');mi.className='inp';
    mi.placeholder='피드백 메모 (선택사항)';mi.value=L.res[key].m||'';
    mi.style.marginBottom='0';mi.oninput=()=>L.res[key].m=mi.value;w.appendChild(mi);
  }
  return w;
}

function sectionBlockRO(label,plan,res,showRes){
  const w=mk('div','section-block');
  const tag=mk('div','section-tag',label.split('—')[0].trim());
  w.appendChild(tag);
  w.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:8px;',label.split('—')[1]?.trim()||''));
  w.appendChild(mks('div','font-size:13px;color:#333;line-height:1.6;white-space:pre-wrap;min-height:16px;',plan||'<span style="color:#ccc">—</span>'));
  if(showRes&&res){
    w.appendChild(mk('div','divider'));
    if(res.r){
      const row=mks('div','display:flex;align-items:center;gap:8px;');
      row.appendChild(mks('span',`display:inline-block;font-size:12px;font-weight:700;color:#fff;background:${RC[res.r]};padding:3px 14px;border-radius:20px;`,res.r));
      if(res.m)row.appendChild(mks('span','font-size:12px;color:#888;',res.m));
      w.appendChild(row);
    }else{w.appendChild(mks('div','font-size:12px;color:#ccc;','완성도 미입력'));}
  }
  return w;
}

function showModal(title,msg,onOk){
  const bg=mk('div','modal-bg');
  const box=mk('div','modal');
  box.appendChild(mks('div','font-size:15px;font-weight:500;color:#111;margin-bottom:8px;',title));
  box.appendChild(mks('div','font-size:13px;color:#555;',msg));
  const btns=mk('div','modal-btns');
  const cancel=mk('button','btn-ghost','취소');cancel.onclick=()=>bg.remove();
  const ok=mk('button','btn-danger','삭제');ok.onclick=()=>{bg.remove();onOk();};
  btns.appendChild(cancel);btns.appendChild(ok);box.appendChild(btns);
  bg.appendChild(box);document.body.appendChild(bg);
}

function makeDateDropdown(selectedDate,onChange){
  const now=new Date();
  const year=now.getFullYear(),month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthDates=[];
  for(let d=daysInMonth;d>=1;d--){
    const dd=String(d).padStart(2,'0'),mm=String(month+1).padStart(2,'0');
    monthDates.push(`${year}-${mm}-${dd}`);
  }
  const ds=document.createElement('select');
  ds.style.cssText='background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:13px;font-weight:600;padding:8px 12px;border-radius:10px;width:100%;cursor:pointer;';
  monthDates.forEach(d=>{
    const o=document.createElement('option');o.value=d;
    o.style.cssText='background:#1a2f6e;color:#fff;';
    o.textContent=fd(d)+(d===TODAY?' (오늘)':'');
    if(d===selectedDate)o.selected=true;ds.appendChild(o);
  });
  ds.onchange=()=>onChange(ds.value);
  return ds;
}

    btn.textContent='저장 중...';btn.disabled=true;

            else{ldr.studentIds=(ldr.studentIds||[]).filter(id=>id!==s.id);}
          };
          const lbl=mks('div','flex:1;');
          lbl.appendChild(mks('div','font-size:13px;color:#111;',s.name));
          const cls=Q.classes&&Q.classes.find(c=>c.id===s.classId);
          if(cls)lbl.appendChild(mks('div','font-size:10px;color:#aaa;',cls.name));
          row.onclick=e=>{if(e.target!==cb){cb.checked=!cb.checked;cb.onchange();}};
          row.appendChild(cb);row.appendChild(lbl);stuList.appendChild(row);
        });
        cbody.appendChild(stuList);
        const emsg=mks('div','margin-top:8px;');cbody.appendChild(emsg);
        const btnRow=mks('div','display:flex;gap:8px;margin-top:8px;');
        const saveBtn=mk('button','btn-primary','저장');saveBtn.style.flex='1';
        saveBtn.onclick=async()=>{
          const idx=Q.leaders.findIndex(l=>l.id===ldr.id);
          if(idx>=0)Q.leaders[idx]={...Q.leaders[idx],name:ni.value.trim()||ldr.name,code:nci.value.trim()||ldr.code,studentIds:ldr.studentIds||[]};
          await saveLeaders();Q._expandedLdr=null;render();
        };
        const delBtn=mk('button','btn-sm','삭제');delBtn.style.cssText='color:#dc2626;border-color:#fca5a5;';
        delBtn.onclick=()=>showModal('리더 삭제',`"${ldr.name}" 학습리더를 삭제합니다.`,async()=>{
          Q.leaders=Q.leaders.filter(l=>l.id!==ldr.id);await saveLeaders();Q._expandedLdr=null;render();
        });
        btnRow.appendChild(saveBtn);btnRow.appendChild(delBtn);cbody.appendChild(btnRow);
        card.appendChild(cbody);
      }
      lc.appendChild(card);
    });
  }

  // 영상 관리
  const vc=mk('div','card');vc.style.marginTop='12px';w2.appendChild(vc);
  const vhdr=mks('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;');

  const vaBtn=mk('button','btn-ghost',Q.showVidAdd?'닫기':'+ 영상 추가');
  vaBtn.onclick=()=>{Q.showVidAdd=!Q.showVidAdd;render();};vhdr.appendChild(vaBtn);vc.appendChild(vhdr);
  if(Q.showVidAdd){
    const af=mk('div','add-form');vc.appendChild(af);
    af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','영상 제목'));
    const vt=document.createElement('input');vt.id='vt';vt.className='inp';vt.placeholder='예: 1강 - 관계대명사 기초';af.appendChild(vt);
    af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','유튜브 URL'));
    const vu=document.createElement('input');vu.id='vu';vu.className='inp';vu.placeholder='https://www.youtube.com/watch?v=...';af.appendChild(vu);
    af.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','설명 (선택)'));
    const vd=document.createElement('input');vd.id='vd';vd.className='inp';vd.placeholder='예: 관계대명사 who, which 핵심 정리';af.appendChild(vd);
    const vmsg=mks('div','');af.appendChild(vmsg);
    const vAddBtn=mk('button','btn-primary','영상 추가');
    vAddBtn.onclick=async()=>{
      const title=(document.getElementById('vt')?.value||'').trim();
      const url=(document.getElementById('vu')?.value||'').trim();
      const desc=(document.getElementById('vd')?.value||'').trim();
      const id=ytId(url);
      if(!title){vmsg.innerHTML='<div class="err">제목을 입력하세요.</div>';return;}
      if(!id){vmsg.innerHTML='<div class="err">올바른 유튜브 URL을 입력하세요.</div>';return;}
      Q.videos.unshift({id:Date.now().toString(),title,ytId:id,desc});
      await saveVideos();Q.showVidAdd=false;render();
    };af.appendChild(vAddBtn);
  }
  if(!Q.videos.length){vc.appendChild(mk('div','empty-box','등록된 영상이 없습니다.'));}
  else{
    Q.videos.forEach(v=>{

      const card=mks('div','border:1px solid #f0f0ee;border-radius:10px;margin-top:8px;overflow:hidden;');
      const chdr=mks('div','display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;background:#fafafa;');
      const cl=mks('div','flex:1;');
      cl.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;',v.title));
      if(v.desc&&!expanded)cl.appendChild(mks('div','font-size:11px;color:#aaa;margin-top:2px;',v.desc));
      chdr.appendChild(cl);chdr.appendChild(mks('span','font-size:13px;color:#aaa;margin-left:8px;',expanded?'▲':'▼'));
      chdr.onclick=()=>{Q._expandedVid=expanded?null:v.id;render();};
      card.appendChild(chdr);
      if(expanded){
        const cbody=mks('div','padding:12px;border-top:1px solid #f0f0ee;background:#fff;');
        cbody.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:4px;','제목'));
        const ti=document.createElement('input');ti.className='inp';ti.value=v.title;cbody.appendChild(ti);
        cbody.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:4px;','유튜브 URL'));
        const ui=document.createElement('input');ui.className='inp';ui.value=`https://www.youtube.com/watch?v=${v.ytId}`;cbody.appendChild(ui);
        cbody.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:4px;','설명'));
        const di=document.createElement('input');di.className='inp';di.style.marginBottom='10px';di.value=v.desc||'';cbody.appendChild(di);
        const emsg=mks('div','');cbody.appendChild(emsg);
        const btnRow=mks('div','display:flex;gap:8px;');
        const saveBtn=mk('button','btn-primary','저장');saveBtn.style.flex='1';
        saveBtn.onclick=async()=>{
          const newTitle=ti.value.trim();const newId=ytId(ui.value.trim());
          if(!newTitle){emsg.innerHTML='<div class="err">제목을 입력하세요.</div>';return;}
          if(!newId){emsg.innerHTML='<div class="err">올바른 유튜브 URL을 입력하세요.</div>';return;}
          const idx=Q.videos.findIndex(x=>x.id===v.id);
          if(idx>=0)Q.videos[idx]={...Q.videos[idx],title:newTitle,ytId:newId,desc:di.value.trim()};
          await saveVideos();Q._expandedVid=null;render();
        };
        const delBtn=mk('button','btn-sm','삭제');delBtn.style.color='#dc2626';delBtn.style.borderColor='#fca5a5';
        delBtn.onclick=()=>showModal('영상 삭제',`"${v.title}" 영상을 삭제합니다.`,async()=>{Q.videos=Q.videos.filter(x=>x.id!==v.id);await saveVideos();Q._expandedVid=null;render();});
        btnRow.appendChild(saveBtn);btnRow.appendChild(delBtn);cbody.appendChild(btnRow);card.appendChild(cbody);
      }
      vc.appendChild(card);
    });
  }
}

async function lList(){
  const ldr=Q.lLeader;
  const w=mks('div','');A.appendChild(w);
  const hdr=mks('div','background:#1a5c36;padding:20px 20px 20px;border-radius:20px;margin:12px 12px 0;');
  const topRow=mks('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;');
  const bb=mk('button','btn-back','← 뒤로');bb.style.color='rgba(255,255,255,0.7)';bb.onclick=()=>{Q.scr='home';Q.lLeader=null;render();};topRow.appendChild(bb);
  const logoutBtn=mk('button','logout-btn',ldr.name+' 로그아웃');logoutBtn.onclick=()=>{Q.lLeader=null;Q.scr='lLogin';render();};topRow.appendChild(logoutBtn);
  hdr.appendChild(topRow);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;',ldr.name+' 선생님'));
  hdr.appendChild(makeDateDropdown(Q.lDate,v=>{Q.lDate=v;render();}));
  w.appendChild(hdr);

  const selDow=dowOf(Q.lDate);
  const myStudents=(ldr.studentIds||[]).map(id=>Q.students.find(s=>s.id===id)).filter(Boolean);
  const todayStu=myStudents.filter(s=>s.days&&s.days.includes(selDow));
  const otherStu=myStudents.filter(s=>!s.days||!s.days.includes(selDow));

  const body=mk('div','page-body');w.appendChild(body);

  if(todayStu.length){
    const toLoad=todayStu.filter(s=>!MEM.lessons[`${s.id}__${Q.lDate}`]);
    if(toLoad.length){
      body.appendChild(mks('div','font-size:12px;color:#aaa;text-align:center;padding:16px;','불러오는 중...'));
      await Promise.all(toLoad.map(s=>getLesson(s.id,Q.lDate)));
      body.innerHTML='';
    }
  }

  if(!myStudents.length){
    body.appendChild(mk('div','empty-box','담당 학생이 배정되지 않았습니다.\n관리자에게 문의하세요.'));
    return;
  }

  body.appendChild(mks('div','font-size:11px;color:#888;font-weight:600;margin-bottom:8px;',fd(Q.lDate)+' 수업'));

  const ATT_LABEL={present:'출석',late:'지각',absent:'결석'};
  const ATT_COL={present:'#16a34a',late:'#d97706',absent:'#dc2626'};
  const HW_LABEL={done:'완료',notdone:'미완료'};
  const SL_BADGE={none:'badge badge-none',planned:'badge badge-plan',completed:'badge badge-done'};

  if(!todayStu.length){
    body.appendChild(mk('div','empty-box','오늘 수업 학생이 없습니다.'));
  }else{
    todayStu.forEach(stu=>{
      const l=MEM.lessons[`${stu.id}__${Q.lDate}`]||{status:'none'};
      const sc=mk('div','stu-card');
      const row=mks('div','display:flex;justify-content:space-between;align-items:center;');
      const left=mks('div','flex:1;cursor:pointer;min-width:0;');
      left.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;',stu.name));
      // 상태 줄
      const statusRow=mks('div','display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;');
      if(l.attendance){
        statusRow.appendChild(mks('span',`font-size:10px;font-weight:600;color:${ATT_COL[l.attendance]||'#aaa'};`,ATT_LABEL[l.attendance]||''));
      }
      if(l.homework){
        statusRow.appendChild(mks('span','font-size:10px;color:#888;',HW_LABEL[l.homework]||''));
      }
      left.appendChild(statusRow);
      left.onclick=async()=>{Q.lStu=stu;Q.lLesson=await getLesson(stu.id,Q.lDate);Q.scr='lLessonView';render();};
      row.appendChild(left);
      const right=mks('div','display:flex;align-items:center;gap:6px;flex-shrink:0;');
      right.appendChild(mk('span',SL_BADGE[l.status],SL[l.status]));
      row.appendChild(right);
      sc.appendChild(row);
      body.appendChild(sc);
    });
  }

  if(otherStu.length){
    const tog=mk('button','tog-btn',Q._lShowOther?'▲ 다른 요일 학생 접기':`▼ 다른 요일 학생 보기 (${otherStu.length}명)`);
    tog.onclick=()=>{Q._lShowOther=!Q._lShowOther;render();};body.appendChild(tog);
    if(Q._lShowOther){
      body.appendChild(mks('div','font-size:11px;color:#aaa;padding:8px 2px 4px;','다른 요일'));
      otherStu.forEach(stu=>{
        const sc=mk('div','stu-card');sc.style.opacity='0.5';
        sc.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;',stu.name));
        sc.style.cursor='pointer';
        sc.onclick=async()=>{Q.lStu=stu;Q.lLesson=await getLesson(stu.id,Q.lDate);Q.scr='lLessonView';render();};
        body.appendChild(sc);
      });
    }
  }
}

async function lLessonView(){
  const stu=Q.lStu;
  const L=Q.lLesson;
  if(!L.vocab)L.vocab={score:'',comment:''};

  const w=mks('div','');A.appendChild(w);
  const hdr=mks('div','background:#1a5c36;padding:20px 20px 24px;border-radius:20px;margin:12px 12px 0;');
  const bb=mk('button','btn-back','← 뒤로');bb.style.color='rgba(255,255,255,0.7)';bb.onclick=()=>{Q.scr='lList';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;',stu.name));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;',fd(Q.lDate)));
  w.appendChild(hdr);

  const body=mk('div','page-body');w.appendChild(body);

  const tabs=mk('div','tab-wrap');body.appendChild(tabs);
  const tabItems=[{k:'attend',label:'출결·숙제'},{k:'lesson',label:'수업 진행'},{k:'vocab',label:'단어시험'}];
  const lTab=Q._lTab||'attend';
  tabItems.forEach(t=>{
    const tb=mk('button','tab-btn'+(lTab===t.k?' active':''),t.label);
    tb.onclick=()=>{Q._lTab=t.k;render();};tabs.appendChild(tb);
  });

  const msg=mks('div','');

  // === 탭 1: 출결·숙제 ===
  if(lTab==='attend'){
    // 출결
    const ab=mk('div','section-block');
    ab.appendChild(mk('div','section-tag-green','출결 체크'));
    const attRow=mks('div','display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;');
    const attBtns={};
    const updAtt=v=>{
      L.attendance=v;
      Object.entries(attBtns).forEach(([k,btn])=>{
        const isActive=k===v;
        btn.className='att-btn att-'+k+(isActive?' active':'');
      });
    };
    [{k:'present',label:'출석'},{k:'late',label:'지각'},{k:'absent',label:'결석'}].forEach(a=>{
      const btn=document.createElement('button');
      btn.className='att-btn att-'+a.k+(L.attendance===a.k?' active':'');
      btn.textContent=a.label;
      btn.onclick=()=>updAtt(a.k);
      attBtns[a.k]=btn;attRow.appendChild(btn);
    });
    ab.appendChild(attRow);
    ab.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:6px;','메모 (선택)'));
    const attMemo=document.createElement('input');attMemo.className='inp';
    attMemo.style.marginBottom='0';attMemo.placeholder='예: 늦게 도착, 몸 상태 좋지 않음';
    attMemo.value=L.attendanceMemo||'';attMemo.oninput=()=>L.attendanceMemo=attMemo.value;
    ab.appendChild(attMemo);
    body.appendChild(ab);

    // 숙제
    const hb=mk('div','section-block');
    hb.appendChild(mk('div','section-tag-green','숙제 확인'));
    const hwRow=mks('div','display:flex;gap:8px;margin-bottom:12px;');
    const hwBtns={};
    const updHw=v=>{
      L.homework=v;
      Object.entries(hwBtns).forEach(([k,btn])=>{
        btn.className='att-btn hw-'+k+(k===v?' active':'');
      });
    };
    [{k:'done',label:'완료'},{k:'notdone',label:'미완료'}].forEach(h=>{
      const btn=document.createElement('button');
      btn.className='att-btn hw-'+h.k+(L.homework===h.k?' active':'');
      btn.textContent=h.label;
      btn.onclick=()=>updHw(h.k);
      hwBtns[h.k]=btn;hwRow.appendChild(btn);
    });
    hb.appendChild(hwRow);
    const hwMemo=document.createElement('input');hwMemo.className='inp';
    hwMemo.style.marginBottom='0';hwMemo.placeholder='숙제 관련 메모';
    hwMemo.value=L.homeworkMemo||'';hwMemo.oninput=()=>L.homeworkMemo=hwMemo.value;
    hb.appendChild(hwMemo);
    body.appendChild(hb);
    body.appendChild(msg);
    const btn=mk('button','btn-green','저장');
    btn.onclick=async()=>{
      btn.textContent='저장 중...';btn.disabled=true;
      if(L.status==='none'&&L.attendance)L.status='planned';
      await setLesson(stu.id,Q.lDate,L);
      msg.innerHTML='<div class="ok-msg">✓ 저장되었습니다!</div>';
      setTimeout(()=>{btn.textContent='저장';btn.disabled=false;msg.innerHTML='';},1500);
    };body.appendChild(btn);
  }

  // === 탭 2: 수업 진행 ===
  else if(lTab==='lesson'){
    if(L.status==='none'||!L.plan||(!L.plan.check&&!L.plan.core&&!L.plan.fix)){
      body.appendChild(mk('div','empty-box','수업 계획이 아직 입력되지 않았습니다.\n관리자가 계획을 입력한 후 이 탭을 사용할 수 있습니다.'));
    }else{
      // 수업 계획 (읽기 전용) + 완성도 입력
      LK.forEach((k,i)=>body.appendChild(sectionBlock(LABELS[i],L,k,true,true)));
      body.appendChild(msg);
      const btn=mk('button','btn-green','완성도 저장');
      btn.onclick=async()=>{
        btn.textContent='저장 중...';btn.disabled=true;
        L.status='completed';
        await setLesson(stu.id,Q.lDate,L);
        msg.innerHTML='<div class="ok-msg">✓ 저장되었습니다!</div>';
        setTimeout(()=>{btn.textContent='완성도 저장';btn.disabled=false;msg.innerHTML='';},1500);
      };body.appendChild(btn);
    }
  }

  // === 탭 3: 단어시험 ===
  else{
    const vb=mk('div','section-block');
    vb.appendChild(mk('div','section-tag-green','단어시험'));
    const vrow=mks('div','display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;');
    const vsi=document.createElement('input');vsi.className='inp';
    vsi.style.cssText='margin-bottom:0;width:90px;flex-shrink:0;';
    vsi.type='number';vsi.placeholder='점수';vsi.value=L.vocab.score||'';
    vsi.oninput=()=>L.vocab.score=vsi.value;
    vrow.appendChild(vsi);
    vrow.appendChild(mks('div','font-size:13px;color:#888;flex-shrink:0;','점'));
    const passBtn=mks('button','att-btn att-present','통과');
    const failBtn=mks('button','att-btn att-absent','불통');
    const updPF=v=>{
      L.vocab.pass=v;
      passBtn.className='att-btn att-present'+(v==='pass'?' active':'');
      failBtn.className='att-btn att-absent'+(v==='fail'?' active':'');
    };
    passBtn.onclick=()=>updPF('pass');failBtn.onclick=()=>updPF('fail');
    updPF(L.vocab.pass||'');
    vrow.appendChild(passBtn);vrow.appendChild(failBtn);
    vb.appendChild(vrow);
    vb.appendChild(mks('div','font-size:11px;color:#888;margin-bottom:6px;','코멘트'));
    const vci=document.createElement('input');vci.className='inp';
    vci.style.marginBottom='0';vci.placeholder='예: 오늘 점수 좋아요!';
    vci.value=L.vocab.comment||'';vci.oninput=()=>L.vocab.comment=vci.value;
    vb.appendChild(vci);
    body.appendChild(vb);
    body.appendChild(msg);
    const btn=mk('button','btn-green','저장');
    btn.onclick=async()=>{
      btn.textContent='저장 중...';btn.disabled=true;
      await setLesson(stu.id,Q.lDate,L);
      msg.innerHTML='<div class="ok-msg">✓ 저장되었습니다!</div>';
      setTimeout(()=>{btn.textContent='저장';btn.disabled=false;msg.innerHTML='';},1500);
    };body.appendChild(btn);
  }
}

  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='home';Q.err='';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;font-family:GmarketSans,sans-serif;','학부모 조회'));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;','수업 내용 및 결과 확인'));
  w.appendChild(hdr);
  if(Q.pStu){Q.pLesson=await getLesson(Q.pStu.id,Q.pDate);Q.pDates=await getDatesAsync(Q.pStu.id);Q.scr='pView';render();return;}
  const body=mk('div','page-body');w.appendChild(body);
  const c=mk('div','card');body.appendChild(c);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','학생 이름'));
  const ni=document.createElement('input');ni.className='inp';ni.placeholder='홍길동';c.appendChild(ni);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','접근 코드'));
  const ci=document.createElement('input');ci.className='inp';ci.type='password';ci.placeholder='코드 4자리';c.appendChild(ci);
  if(Q.err)c.appendChild(mk('div','err',Q.err));
  const doL=async()=>{
    const name=ni.value.trim();const code=ci.value.trim();
    const found=Q.students.find(s=>s.name===name&&s.code===code);
    if(found){Q.pStu=found;Q.pDate=TODAY;Q.pLesson=await getLesson(found.id,TODAY);Q.pDates=await getDatesAsync(found.id);Q.pTab='plan';Q.scr='pView';Q.err='';render();}
    else{Q.err='이름 또는 코드가 맞지 않습니다.';render();}
  };
  ci.onkeydown=e=>{if(e.key==='Enter')doL();};

}

async function pView(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const topRow=mks('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.pStu=null;Q.scr='pLogin';render();};topRow.appendChild(bb);
  const chartBtn=mk('button','btn-ghost-inv','📊 그래프');chartBtn.onclick=()=>{Q.scr='pChart';render();};topRow.appendChild(chartBtn);
  hdr.appendChild(topRow);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;',Q.pStu.name));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px;','수업 현황 조회'));
  hdr.appendChild(makeDateDropdown(Q.pDate,async v=>{Q.pDate=v;Q.pLesson=await getLesson(Q.pStu.id,v);render();}));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  const tabs=mk('div','tab-wrap');body.appendChild(tabs);
  ['plan','result'].forEach(t=>{
    const tb=mk('button','tab-btn'+(Q.pTab===t?' active':''),t==='plan'?'오늘 배울 내용':'수업 결과');
    tb.onclick=()=>{Q.pTab=t;render();};tabs.appendChild(tb);
  });
  const L=Q.pLesson;
  if(!L||L.status==='none'){
    body.appendChild(mk('div','empty-box',Q.pTab==='plan'?'아직 수업 계획이 입력되지 않았습니다.':'아직 수업 결과가 없습니다.'));
  }else{
    const showRes=Q.pTab==='result'&&L.status==='completed';
    LK.forEach((k,i)=>body.appendChild(sectionBlockRO(LABELS[i],L.plan[k],showRes?L.res[k]:null,showRes)));
    if(showRes&&L.vocab&&L.vocab.score){
      const vb=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:14px;margin-bottom:10px;');
      vb.appendChild(mk('div','section-tag','단어시험'));
      const vrow=mks('div','display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;');
      vrow.appendChild(mks('span','font-size:18px;font-weight:700;color:#1a2f6e;',L.vocab.score+'점'));
      if(L.vocab.pass){
        const pc=L.vocab.pass==='pass';
        vrow.appendChild(mks('span',`font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;background:${pc?'#ecfdf5':'#fef2f2'};color:${pc?'#059669':'#dc2626'};`,pc?'통과':'불통'));
      }
      if(L.vocab.comment)vrow.appendChild(mks('span','font-size:12px;color:#888;',L.vocab.comment));
      vb.appendChild(vrow);body.appendChild(vb);
    }
    // 출결 표시 (리더가 체크한 경우)
    if(showRes&&L.attendance){
      const ac={present:'출석',late:'지각',absent:'결석'};
      const acol={present:'#16a34a',late:'#d97706',absent:'#dc2626'};
      const ab=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;');
      ab.appendChild(mk('div','section-tag','출결'));
      ab.appendChild(mks('span',`font-size:13px;font-weight:600;color:${acol[L.attendance]||'#888'};`,ac[L.attendance]||''));
      if(L.attendanceMemo)ab.appendChild(mks('span','font-size:12px;color:#888;',L.attendanceMemo));
      body.appendChild(ab);
    }
  }
  // 코멘트 섹션
  const pc=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:14px;margin-bottom:10px;');
  const commentKey=Q.pTab==='plan'?'planComment':'resultComment';
  pc.appendChild(mks('div','font-size:12px;font-weight:700;color:#111;margin-bottom:8px;','💬 선생님께 코멘트 남기기'));
  const ta=document.createElement('textarea');ta.className='section-ta';ta.rows=3;
  ta.placeholder=Q.pTab==='plan'?'수업 전 전달 사항을 남겨주세요.':'수업 후 느낀 점이나 전달 사항을 남겨주세요.';
  ta.value=(L&&L[commentKey])||'';
  ta.oninput=()=>{if(L)L[commentKey]=ta.value;};
  pc.appendChild(ta);
  const cbtn=mk('button','btn-primary','코멘트 저장');
  cbtn.onclick=async()=>{
    if(!L)return;L[commentKey]=ta.value;
    if(L.status==='none')L.status='planned';
    await setLesson(Q.pStu.id,Q.pDate,L);
    cbtn.textContent='✓ 저장됨';cbtn.disabled=true;
    setTimeout(()=>{cbtn.textContent='코멘트 저장';cbtn.disabled=false;},1500);
  };pc.appendChild(cbtn);body.appendChild(pc);
}

function pChart(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='pView';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;',Q.pStu.name+' 수업 현황'));
  hdr.appendChild(mks('div','font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;','완성도가 기록된 최근 수업 기준'));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  const allDates=getDates(Q.pStu.id);
  const dates=allDates.filter(d=>{const l=MEM.lessons[`${Q.pStu.id}__${d}`];return l&&l.status==='completed';}).slice(0,10).reverse();
  if(!dates.length){body.appendChild(mk('div','empty-box','아직 완성도 기록이 없습니다.'));return;}
  const cw=mk('div','chart-wrap');body.appendChild(cw);
  cw.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;margin-bottom:14px;','단계별 완성도 (최근 '+dates.length+'회)'));
  dates.forEach(d=>{
    const l=MEM.lessons[`${Q.pStu.id}__${d}`];
    if(!l)return;
    const row=mk('div','chart-bar-row');
    row.appendChild(mks('div','font-size:11px;color:#888;width:50px;flex-shrink:0;text-align:right;',fdShort(d)));
    const bars=mks('div','flex:1;display:flex;flex-direction:column;gap:3px;');
    LK.forEach((k,i)=>{
      const r=l.res?.[k]?.r;
      const pct=r?Math.round((RV[r]/3)*100):0;
      const col=r?RC[r]:'#e8e8e6';
      const br=mks('div','width:100%;background:#f0f0ee;border-radius:4px;height:16px;overflow:hidden;position:relative;');
      const bf=mks('div',`height:100%;border-radius:4px;background:${col};width:${pct}%;transition:width .3s;`,'');
      br.appendChild(bf);
      const lbl=mks('div','position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:9px;color:#fff;font-weight:700;',r||'');
      bf.appendChild(lbl);
      const stlbl=mks('div','font-size:9px;color:#888;width:30px;text-align:right;flex-shrink:0;',['C','CO','F'][i]);
      const brow=mks('div','display:flex;align-items:center;gap:4px;');
      brow.appendChild(stlbl);brow.appendChild(br);bars.appendChild(brow);
    });
    row.appendChild(bars);cw.appendChild(row);
    cw.appendChild(mks('div','border-top:1px solid #f5f5f3;margin:6px 0;',''));
  });
}

// ===================== 공지사항 =====================
function noticeList(){
  const fromAdmin=Q._fromAdmin;
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const topRow=mks('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr=fromAdmin?'aList':'home';Q._fromAdmin=false;render();};topRow.appendChild(bb);
  if(fromAdmin){
    const wb=mk('button','btn-ghost-inv','+ 공지 작성');wb.onclick=()=>{Q.scr='noticeWrite';render();};topRow.appendChild(wb);
  }
  hdr.appendChild(topRow);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;','학원 공지사항'));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  if(!Q.notices||!Q.notices.length){body.appendChild(mk('div','empty-box','등록된 공지가 없습니다.'));return;}
  Q.notices.forEach(n=>{
    const d=new Date(n.createdAt);
    const dateStr=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    const exp=Q._expandedNotice===n.id;
    const card=mks('div','background:#fff;border:1px solid #e8e8e6;border-radius:14px;margin-bottom:8px;overflow:hidden;cursor:pointer;');
    const chdr=mks('div','padding:14px 16px;');
    const topn=mks('div','display:flex;justify-content:space-between;align-items:flex-start;');
    topn.appendChild(mks('div','font-size:13px;font-weight:600;color:#111;flex:1;',n.title));
    topn.appendChild(mks('div','font-size:11px;color:#bbb;flex-shrink:0;margin-left:8px;',dateStr));
    chdr.appendChild(topn);
    if(!exp&&n.content){chdr.appendChild(mks('div','font-size:11px;color:#aaa;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;',n.content));}
    card.appendChild(chdr);
    if(exp){
      const cbody=mks('div','padding:0 16px 14px;border-top:1px solid #f0f0ee;');
      cbody.appendChild(mks('div','font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;padding-top:12px;',n.content||''));
      if(fromAdmin){
        const delBtn=mk('button','btn-sm','삭제');delBtn.style.cssText='color:#dc2626;border-color:#fca5a5;margin-top:10px;';
        delBtn.onclick=e=>{e.stopPropagation();showModal('공지 삭제','이 공지를 삭제합니다.',async()=>{Q.notices=Q.notices.filter(x=>x.id!==n.id);await saveNotices();Q._expandedNotice=null;render();});};
        cbody.appendChild(delBtn);
      }
      card.appendChild(cbody);
    }
    card.onclick=()=>{Q._expandedNotice=exp?null:n.id;render();};
    body.appendChild(card);
  });
}

function noticeWrite(){
  const w=mks('div','');A.appendChild(w);
  const hdr=mk('div','page-header');
  const bb=mk('button','btn-back','← 뒤로');bb.onclick=()=>{Q.scr='noticeList';render();};hdr.appendChild(bb);
  hdr.appendChild(mks('div','font-size:18px;font-weight:700;color:#fff;','공지 작성'));
  w.appendChild(hdr);
  const body=mk('div','page-body');w.appendChild(body);
  const c=mk('div','card');body.appendChild(c);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','제목'));
  const ti=document.createElement('input');ti.className='inp';ti.placeholder='공지 제목';c.appendChild(ti);
  c.appendChild(mks('div','font-size:12px;color:#888;margin-bottom:5px;','내용'));
  const ta=document.createElement('textarea');ta.className='section-ta';ta.rows=6;ta.placeholder='공지 내용을 입력하세요.';ta.style.marginBottom='10px';c.appendChild(ta);
  const msg=mks('div','');c.appendChild(msg);
  const btn=mk('button','btn-primary','게시하기');
  btn.onclick=async()=>{
    const title=ti.value.trim();if(!title){msg.innerHTML='<div class="err">제목을 입력하세요.</div>';return;}
    if(!Q.notices)Q.notices=[];
    Q.notices.unshift({id:Date.now().toString(),title,content:ta.value.trim(),createdAt:Date.now()});
    await saveNotices();
    msg.innerHTML='<div class="ok-msg">✓ 게시됐습니다!</div>';
    setTimeout(()=>{Q.scr='noticeList';render();},700);
  };c.appendChild(btn);
}
